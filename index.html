<body>
<div id="root"></div>
<script type="text/babel">
// ══ PERSONALIZE SUA MARCA ══
const BRAND_NAME    = "Nexus AI";
const BRAND_TAGLINE = "Sales Intelligence";
const BRAND_INITIAL = "N";
// ════════════════════════════

const{useState,useEffect,useRef,useCallback}=React;
const uid=()=>Math.random().toString(36).slice(2,10);
const ts=()=>new Date().toISOString();
const fmt=iso=>new Date(iso||Date.now()).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
const fmtD=iso=>new Date(iso||Date.now()).toLocaleDateString('pt-BR');
const ago=iso=>{const m=Math.round((Date.now()-new Date(iso))/60000);return m<60?`${m}min`:`${Math.round(m/60)}h`;};
const AVC=['#10b981','#3b82f6','#8b5cf6','#f97316','#ef4444','#0891b2','#d97706','#7c3aed'];
const SK='nexus_saas_v1';
const ld=()=>{try{return JSON.parse(localStorage.getItem(SK))||{};}catch{return{};}};
const sv=d=>localStorage.setItem(SK,JSON.stringify(d));

async function callAI(messages,system,temp=0.7){
  const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages,system,temperature:temp})});
  if(!r.ok){const e=await r.json();throw new Error(e.error||'Erro no servidor');}
  return(await r.json()).content;
}

const NICHES=[
  {id:'sales',icon:'💼',name:'Vendas Gerais',badge:'Geral',prompt:'Você é um consultor de vendas de alta performance. Use SPIN Selling e BANT. Identifique a dor do cliente antes de apresentar a solução. Seja persuasivo mas ético. Responda sempre em português.',kws:['Qual o preço?','Tem desconto?','Como funciona?','Prazo de entrega?','Parcelam?','Qual a garantia?','Posso testar?','Tem versão grátis?','Como contratar?','Diferença dos planos?','Tem suporte?','Como cancelo?','Formas de pagamento?','Frete grátis?','Prazo de devolução?','Aceita cartão?']},
  {id:'law',icon:'⚖️',name:'Jurídico',badge:'Advogados',prompt:'Você é um assistente jurídico especializado. Cite artigos de lei relevantes. Faça perguntas para entender o caso. SEMPRE recomende consulta presencial com advogado. Responda em português.',kws:['Preciso de divórcio','Demitido sem justa causa','Acidente de trabalho','Dívida no nome','Inventariar bens','Vizinho me prejudica','Calúnia online','Pensão alimentícia','Guarda dos filhos','Rescisão de contrato','Processo trabalhista','Contrato de locação','Multa do condomínio','Defesa do consumidor','Regularizar imóvel?','Habeas corpus']},
  {id:'med',icon:'🏥',name:'Saúde',badge:'Médicos',prompt:'Você é um assistente de triagem de saúde empático. Pergunte sobre sintomas, duração e intensidade. SEMPRE enfatize que não substitui consulta médica. Responda em português.',kws:['Estou com febre','Dor de cabeça','Sintomas de gripe','Quero consulta','Preciso de receita','Dor no peito','Tontura','Pressão alta','Dor nas costas','Ansiedade','Insônia','Consulta de rotina','Vacinas','Dor de garganta','Alergia','Resultado de exame']},
  {id:'imob',icon:'🏠',name:'Imóveis',badge:'Imobiliárias',prompt:'Você é um corretor de imóveis virtual. Entenda localização, metragem, orçamento e família. Descreva imóveis de forma envolvente. Agende visitas. Responda em português.',kws:['Quero comprar apartamento','Casa com quintal','Quanto financiar?','Imóvel no centro?','Quero alugar','Investimento','Condomínio fechado','Aceita permuta?','Como financiar?','Qual o IPTU?','Imóvel na planta','Posso visitar?','Tem garagem?','Pet friendly?','Aceita FGTS?','Documentação']},
  {id:'fashion',icon:'👗',name:'Moda',badge:'E-commerce',prompt:'Você é um consultor de moda pessoal. Pergunte sobre ocasião, estilo, orçamento e biotipo antes de sugerir. Sugira looks completos. Responda em português.',kws:['Quero mudar meu estilo','Look trabalho','Roupa para festa','Calor','Plus size','Looks casuais','Academia','Presente feminino','Qual bolsa combina?','Minimalista','Moda sustentável','Promoção?','Novidades','Como combinar cores?','Look noite','Tamanho G']},
  {id:'ecom',icon:'🛒',name:'E-commerce',badge:'Lojas Online',prompt:'Você é um atendente de e-commerce eficiente. Ajude a encontrar produtos, acompanhe pedidos, resolva trocas. Seja proativo. Responda em português.',kws:['Cadê meu pedido?','Prazo de entrega','Trocar produto','Produto com defeito','Código de rastreio','Cupom de desconto','Frete grátis?','Em estoque?','Formas de pagamento','Parcelamento','Política de devolução','Nota fiscal','Cancelar pedido','Produto não chegou','Cashback','Endereço errado']},
];
const AUTO_DEF=[
  {id:'a1',name:'Negociação Ativa',desc:'Detecta objeções de preço e faz contra-propostas automáticas',icon:'💰',active:true},
  {id:'a2',name:'Modo Humano Híbrido',desc:'Tom empático automático ao detectar situações delicadas',icon:'🤝',active:true},
  {id:'a3',name:'Resgate de Abandono',desc:'Follow-up automático após 2h de inatividade',icon:'🔔',active:false},
  {id:'a4',name:'Análise de Perdas',desc:'Insights das conversas perdidas',icon:'📊',active:false},
  {id:'a5',name:'Proposta Automática',desc:'Gera proposta PDF ao detectar interesse qualificado',icon:'📄',active:false},
  {id:'a6',name:'Escalonamento Inteligente',desc:'Transfere para humano quando necessário',icon:'🚀',active:false},
];

function detectHyb(msgs){const u=[...msgs].reverse().find(m=>m.role==='user');if(!u)return false;const t=u.content.toLowerCase();return['não sei','difícil','urgente','grave','muito caro','não tenho','desempregado','doente','triste','ansioso','problema sério'].some(w=>t.includes(w));}
function detectNeg(msgs){const u=[...msgs].reverse().find(m=>m.role==='user');if(!u)return false;const t=u.content.toLowerCase();return['caro','preço','desconto','parcelar','parcela','orçamento','custo','valor','não posso','barato','negociar','proposta'].some(w=>t.includes(w));}

function TimeSavedDonut(){const sz=110,cx=55,cy=55,r=38,sw=12,c=2*Math.PI*r;const segs=[{p:.45,col:'#34d399',off:0},{p:.3,col:'#60a5fa',off:.45},{p:.25,col:'#fbbf24',off:.75}];return(<div style={{position:'relative',width:sz,height:sz,display:'flex',alignItems:'center',justifyContent:'center'}}><svg width={sz} height={sz} viewBox={`0 0 ${sz} ${sz}`}><circle cx={cx} cy={cy} r={r} fill="none" stroke="#f3f4f6" strokeWidth={sw}/>{segs.map((s,i)=>(<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.col} strokeWidth={sw} strokeDasharray={`${c*s.p-2} ${c*(1-s.p)+2}`} strokeDashoffset={c*(1-s.off+.25)} strokeLinecap="round"/>))}</svg><div style={{position:'absolute',textAlign:'center'}}><div style={{fontSize:20,fontWeight:800,color:'#111827',lineHeight:1}}>60m</div><div style={{fontSize:9,color:'#9ca3af',marginTop:1}}>Total saved time</div></div></div>);}

function Donut({val,max,color,size=90,sw=10}){const r=(size-sw*2)/2,cx=size/2,cy=size/2,circ=2*Math.PI*r,pct=max>0?val/max:0,dash=circ*pct;return(<div style={{position:'relative',width:size,height:size,display:'flex',alignItems:'center',justifyContent:'center'}}><svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}><circle cx={cx} cy={cy} r={r} fill="none" stroke="#f3f4f6" strokeWidth={sw}/><circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={sw} strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={circ/4} strokeLinecap="round" style={{transition:'stroke-dasharray .5s'}}/></svg><div style={{position:'absolute',textAlign:'center'}}><div style={{fontSize:size>90?18:14,fontWeight:800,color:'#111827',lineHeight:1}}>{max>0?Math.round(pct*100):0}%</div><div style={{fontSize:9,color:'#9ca3af',marginTop:1}}>conv.</div></div></div>);}

function BarChart(){const months=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];const[tip,setTip]=useState(null);const data=months.map((m,i)=>({m,ans:Math.round(45+Math.sin(i)*20+Math.random()*30),ua:Math.round(10+Math.random()*22)}));const mx=Math.max(...data.map(d=>d.ans+d.ua));return(<div><div style={{position:'relative'}}>{tip&&<div className="chart-tip" style={{left:Math.max(0,tip.x-60)}}><div style={{fontWeight:700,marginBottom:2}}>{tip.d}</div><div style={{display:'flex',gap:10}}><span style={{color:'#34d399'}}>● {tip.ans}</span><span style={{color:'#fca5a5'}}>● {tip.ua}</span></div></div>}<div className="bchart">{data.map((d,i)=>(<div key={d.m} className="bcol" onMouseEnter={e=>{const rc=e.currentTarget.getBoundingClientRect(),rp=e.currentTarget.closest('.bchart').getBoundingClientRect();setTip({x:rc.left-rp.left+rc.width/2,d:`${d.m} 2024`,ans:d.ans,ua:d.ua});}} onMouseLeave={()=>setTip(null)}><div className="bstack"><div className="bseg ans" style={{height:`${(d.ans/mx)*100}%`}}/><div className="bseg ua" style={{height:`${(d.ua/mx)*100}%`}}/></div><div className="blbl">{d.m}</div></div>))}</div></div><div className="bleg2"><div className="bleg2-i"><div className="bleg2-d" style={{background:'#34d399'}}/>Answered</div><div className="bleg2-i"><div className="bleg2-d" style={{background:'#fca5a5'}}/>Unanswered</div></div></div>);}

function App(){
  const st=ld();
  const[convs,setConvs]=useState(st.convs||[]);
  const[aid,setAid]=useState(null);
  const[page,setPage]=useState('dashboard');
  const[input,setInput]=useState('');
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState('');
  const[toast,setToast]=useState('');
  const[personas,setPersonas]=useState(st.personas||[{id:'default',name:'Agente Principal',is_active:true,niche:'sales',negotiate:true,hybrid:true,prompt:NICHES[0].prompt}]);
  const[rescueQ,setRescueQ]=useState(st.rescueQ||[]);
  const[activeNiche,setActiveNiche]=useState(st.activeNiche||'sales');
  const[hybMode,setHybMode]=useState(false);
  const[negMode,setNegMode]=useState(false);
  const[autos,setAutos]=useState(st.autos||AUTO_DEF);
  const[showAF,setShowAF]=useState(false);
  const[showAna,setShowAna]=useState(null);
  const[showProp,setShowProp]=useState(null);
  const[aForm,setAForm]=useState({name:'',prompt:'',niche:'sales',negotiate:true,hybrid:true});
  const[serverOk,setServerOk]=useState('loading');
  const endRef=useRef(null);const iRef=useRef(null);

  useEffect(()=>sv({convs,personas,rescueQ,activeNiche,autos}),[convs,personas,rescueQ,activeNiche,autos]);
  useEffect(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),[convs,loading,aid]);
  useEffect(()=>{
    fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:'ping'}],system:'Responda apenas: pong'})})
      .then(r=>r.ok?setServerOk('ok'):setServerOk('err')).catch(()=>setServerOk('err'));
  },[]);

  const showT=m=>{setToast(m);setTimeout(()=>setToast(''),3000);};
  const ac=convs.find(c=>c.id===aid);
  const ap=personas.find(p=>p.is_active)||personas[0];
  const msgs=ac?.messages||[];
  const cn=NICHES.find(n=>n.id===activeNiche)||NICHES[0];
  const total=convs.length,won=convs.filter(c=>c.outcome==='won').length,lost=convs.filter(c=>c.outcome==='lost').length;
  const rate=total>0?Math.round((won/total)*100):0;
  const pendR=rescueQ.filter(x=>x.status==='pending').length;
  const liveC=convs.filter(c=>!c.outcome).length;

  const resetTimer=useCallback(()=>{clearTimeout(iRef.current);if(!aid)return;iRef.current=setTimeout(()=>{const c=convs.find(x=>x.id===aid);if(!c||c.outcome)return;setRescueQ(q=>{if(q.find(x=>x.convId===aid))return q;showT('⏰ Cliente inativo');return[{id:uid(),convId:aid,title:c.title,lastMsg:ts(),status:'pending'},...q];});},120000);},[aid,convs]);
  useEffect(()=>{resetTimer();return()=>clearTimeout(iRef.current);},[msgs.length]);

  const newConv=()=>{const c={id:uid(),title:'Nova conversa',messages:[],outcome:null,created_at:ts(),niche:activeNiche};setConvs(p=>[c,...p]);setAid(c.id);setPage('inbox');setError('');setHybMode(false);setNegMode(false);};
  const delConv=(id,e)=>{e?.stopPropagation();setConvs(p=>p.filter(c=>c.id!==id));if(aid===id)setAid(null);};
  const setOutcome=o=>{setConvs(p=>p.map(c=>c.id===aid?{...c,outcome:o}:c));showT(o==='won'?'🎉 Venda registrada!':'📊 Perdida marcada');};
  const setNiche=id=>{setActiveNiche(id);const n=NICHES.find(x=>x.id===id);if(n)setPersonas(p=>p.map(x=>x.is_active?{...x,prompt:n.prompt,niche:n.id}:x));showT(`✅ Nicho "${n?.name}" ativado`);};

  const send=async()=>{
    if(!input.trim()||loading||!aid)return;
    const text=input.trim();setInput('');setError('');
    const um={id:uid(),role:'user',content:text,created_at:ts()};
    setConvs(prev=>prev.map(c=>{if(c.id!==aid)return c;const nt=c.title==='Nova conversa'?text.slice(0,42):c.title;return{...c,title:nt,messages:[...c.messages,um]};}));
    const allM=[...msgs,um];
    const isH=ap.hybrid&&autos.find(a=>a.id==='a2')?.active&&detectHyb(allM);
    const isN=ap.negotiate&&autos.find(a=>a.id==='a1')?.active&&detectNeg(allM);
    setHybMode(isH);setNegMode(isN);setLoading(true);
    try{
      let sp=ap.prompt;
      if(isH)sp+='\n\n[HYBRID MODE] Cliente em situação delicada. Seja extremamente empático. Tom humano, frases curtas, perguntas abertas. NÃO force vendas agora.';
      if(isN)sp+='\n\n[NEGOTIATION MODE] Cliente resistente a preço. Faça contra-proposta com 2-3 opções: alternativa acessível, parcelamento ou desconto. Seja específico.';
      const hist=[...msgs,um].map(m=>({role:m.role,content:m.content}));
      const aiT=await callAI(hist,sp);
      setConvs(prev=>prev.map(c=>c.id===aid?{...c,messages:[...c.messages,{id:uid(),role:'assistant',content:aiT,created_at:ts(),mode:isH?'hyb':isN?'neg':'normal'}]}:c));
      resetTimer();
    }catch(e){setError(e.message);}finally{setLoading(false);}
  };
  const hKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};
  const chipClick=kw=>{if(!aid){newConv();setTimeout(()=>setInput(kw),160);}else setInput(kw);};

  const analyzeLost=async()=>{if(!ac)return;setLoading(true);try{const tr=msgs.map(m=>`${m.role==='user'?'CLIENTE':'IA'}: ${m.content}`).join('\n');const raw=await callAI([{role:'user',content:`Analise esta conversa onde o cliente NÃO comprou.\n\n${tr}\n\nRetorne APENAS JSON:\n{"objecoes":["..."],"recomendacoes":["..."],"pontos_positivos":["..."],"score_qualidade":7,"resumo":"..."}`}],'Analista sênior de vendas. JSON. Português.',0.2);let data;try{data=JSON.parse(raw.replace(/```json|```/g,'').trim());}catch{data={resumo:raw};}setShowAna({title:ac.title,data});}catch(e){setError(e.message);}finally{setLoading(false);}};
  const genProp=async()=>{if(!ac)return;setLoading(true);try{const tr=msgs.map(m=>`${m.role==='user'?'CLIENTE':'IA'}: ${m.content}`).join('\n');const html=await callAI([{role:'user',content:`Gere proposta comercial em HTML com estilos inline.\nConversa:\n${tr}\nInclua: título, data, necessidades, solução, investimento, próximos passos. Visual limpo.`}],'Especialista em propostas. HTML inline. Português.',0.4);setShowProp({title:ac.title,html});}catch(e){setError(e.message);}finally{setLoading(false);}};
  const sendRescue=async(item)=>{setRescueQ(q=>q.map(x=>x.id===item.id?{...x,status:'sending'}:x));try{const c=convs.find(x=>x.id===item.convId);const last=c?.messages.slice(-3).map(m=>`${m.role==='user'?'Cliente':'IA'}: ${m.content}`).join('\n')||'';const msg=await callAI([{role:'user',content:`Follow-up para cliente que abandonou.\nÚltima interação:\n${last}\nEmpático, 2 frases.`}],'Especialista em recuperação. Português.',0.8);setRescueQ(q=>q.map(x=>x.id===item.id?{...x,status:'sent',message:msg}:x));setConvs(prev=>prev.map(c=>c.id===item.convId?{...c,messages:[...c.messages,{id:uid(),role:'assistant',content:`📨 Follow-up:\n\n${msg}`,created_at:ts(),mode:'rescue'}]}:c));setAid(item.convId);setPage('inbox');showT('📨 Follow-up enviado!');}catch(e){setError(e.message);setRescueQ(q=>q.map(x=>x.id===item.id?{...x,status:'pending'}:x));}};
  const saveAgent=()=>{if(!aForm.name||!aForm.prompt)return;setPersonas(p=>[...p,{id:uid(),...aForm,is_active:false}]);setShowAF(false);setAForm({name:'',prompt:'',niche:'sales',negotiate:true,hybrid:true});showT('✅ Agente criado!');};
  const activateP=id=>{setPersonas(p=>p.map(x=>({...x,is_active:x.id===id})));showT('✅ Agente ativado');};
  const delP=id=>{setPersonas(p=>{const n=p.filter(x=>x.id!==id);if(n.length&&!n.find(x=>x.is_active))n[0].is_active=true;return n;});};

  const NAV=[{id:'dashboard',icon:'⊞',label:'Dashboard'},{id:'inbox',icon:'✉',label:'Inbox',badge:liveC||null},{id:'agents',icon:'🤖',label:'AI Agents'},{id:'automations',icon:'⚡',label:'Automations',badgeGray:autos.filter(a=>a.active).length||null},{id:'knowledge',icon:'📚',label:'Knowledge Base'},{id:'analytics',icon:'📊',label:'Analytics'},{id:'settings',icon:'⚙',label:'Settings'}];
  const RAIL=[{id:'dashboard',e:'⊞'},{id:'inbox',e:'✉'},{id:'agents',e:'🤖'},{id:'automations',e:'⚡'},{id:'knowledge',e:'📚'},{id:'analytics',e:'📊'}];
  const PT={dashboard:'AI Chatbot',inbox:'Inbox',agents:'AI Agents',automations:'Automations',knowledge:'Knowledge Base',analytics:'Analytics',settings:'Settings'};

  const sdStatus=serverOk==='ok'?'#10b981':serverOk==='err'?'#ef4444':'#d1d5db';

  const renderDashboard=()=>(
    <div className="content">
      <div className="sub-bar">
        <div className="page-sub">Hub</div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <div style={{display:'flex',alignItems:'center',gap:6,padding:'5px 10px',borderRadius:99,fontSize:11,fontWeight:500,background:serverOk==='ok'?'#d1fae5':serverOk==='err'?'#fee2e2':'#f3f4f6',color:serverOk==='ok'?'#059669':serverOk==='err'?'#ef4444':'#6b7280'}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:sdStatus,boxShadow:serverOk==='ok'?`0 0 5px ${sdStatus}`:'none'}}/>
            {serverOk==='ok'?'Sistema Online':serverOk==='err'?'Offline':'Verificando...'}
          </div>
          <button className="tbtn">🧪 Test Agent</button>
          <button className="tbtn p" onClick={newConv}>▶ Activate</button>
        </div>
      </div>
      <div className="dash3">
        <div className="card cp">
          <div className="ch"><div><div className="ct">Conversations limit</div><div className="cs">Conversations last month · {total} total</div></div><button className="cm">···</button></div>
          <div className="bleg">{[['#10b981','Weekly'],['#3b82f6','Monthly'],['#8b5cf6','Yearly']].map(([c,l])=>(<div key={l} className="bleg-i"><div className="bleg-d" style={{background:c}}/>{l}</div>))}</div>
          <div className="cbars">{[['#10b981',72],['#3b82f6',55],['#8b5cf6',88]].map(([c,w],i)=>(<div key={i} className="cbar"><div className="cbar-f" style={{width:`${w}%`,background:c}}/></div>))}</div>
          <div className="div"/>
          <div className="ct" style={{marginBottom:8,fontSize:12}}>Transferred to operator</div>
          <div className="ring-wrap">
            <div className="ring-cnt"><svg width={64} height={64} viewBox="0 0 64 64"><circle cx="32" cy="32" r="24" fill="none" stroke="#f3f4f6" strokeWidth="8"/><circle cx="32" cy="32" r="24" fill="none" stroke="#10b981" strokeWidth="8" strokeDasharray={`${2*Math.PI*24*.55} ${2*Math.PI*24*.45}`} strokeDashoffset={2*Math.PI*24*.25} strokeLinecap="round"/></svg><div className="ring-mid"><div className="ring-pct">55%</div></div></div>
            <div className="rtasks">{[['Configurar nicho',true],['Ativar automações',true],['Criar agente IA',serverOk==='ok'],['Receber primeiro cliente',false]].map(([t,d])=>(<div key={t} className="rtask"><div className="rtask-d" style={{background:d?'#10b981':'#e5e7eb'}}/><span style={{color:d?'#374151':'#9ca3af'}}>{t}</span></div>))}</div>
          </div>
        </div>
        <div className="card cp">
          <div className="ch"><div className="ct">Answered Chatbot</div><span className="see-all" onClick={()=>setPage('inbox')}>See All</span></div>
          <div className="asec">Agente Ativo</div>
          <div className="ai-item"><div className="ai-av" style={{background:'#10b981'}}>{ap.name.charAt(0)}</div><div className="ai-info"><div className="ai-name">{ap.name}</div><div className="ai-msg">{serverOk==='ok'?'Pronto para atender':'Verificando conexão...'}</div></div><div className="ai-right"><span className={`badge ${serverOk==='ok'?'b-g':'b-gray'}`}>{serverOk==='ok'?'Active':'...'}</span></div></div>
          <div className="asec" style={{marginTop:10}}>Conversas Recentes</div>
          {convs.length===0&&<div style={{fontSize:11,color:'#9ca3af',padding:'12px 0',textAlign:'center'}}>Nenhuma conversa ainda.<br/>Clique em Activate.</div>}
          {convs.slice(0,3).map((c,i)=>(<div key={c.id} className="ai-item" style={{cursor:'pointer'}} onClick={()=>{setAid(c.id);setPage('inbox');}}><div className="ai-av" style={{background:AVC[(i+1)%AVC.length]}}>{c.title.charAt(0).toUpperCase()}</div><div className="ai-info"><div className="ai-name">{c.title.slice(0,22)}</div><div className="ai-msg">{c.messages.slice(-1)[0]?.content?.slice(0,26)||'...'}...</div></div><div className="ai-right"><span className="ai-t">{c.messages.length}m</span><span className={`badge ${c.outcome==='won'?'b-g':c.outcome==='lost'?'b-r':'b-b'}`}>{c.outcome==='won'?'Won':c.outcome==='lost'?'Lost':'Live'}</span></div></div>))}
        </div>
        <div className="card cp">
          <div className="ch"><div className="ct">Time Saved</div><button className="cm">···</button></div>
          <div className="tsaved"><TimeSavedDonut/></div>
          <div className="tlist">{[['#10b981',fmtD(ts()),total>0?`${Math.round(total*2.5)}m`:'—'],['#60a5fa',fmtD(ts()),'—'],['#fbbf24',fmtD(ts()),'—']].map(([c,d,v],i)=>(<div key={i} className="tlist-r"><div className="tlist-d" style={{background:c}}/><div className="tlist-dt">{d}</div><div className="tlist-v">{v}</div></div>))}</div>
        </div>
      </div>
      <div className="card cp">
        <div className="ch"><div><div className="ct">Responses over time</div></div><div style={{display:'flex',alignItems:'center',gap:10}}><div className="bleg2"><div className="bleg2-i"><div className="bleg2-d" style={{background:'#34d399'}}/>Answered</div><div className="bleg2-i"><div className="bleg2-d" style={{background:'#fca5a5'}}/>Unanswered</div></div><select style={{border:'1px solid #e5e7eb',borderRadius:6,padding:'4px 8px',fontSize:11,color:'#6b7280',outline:'none',background:'#fff',cursor:'pointer'}}><option>Daily</option><option>Weekly</option><option>Monthly</option></select></div></div>
        <BarChart/>
      </div>
    </div>
  );

  const renderInbox=()=>(
    <div className="inbox-wrap">
      <div style={{padding:'8px 22px 0',display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
        <span style={{fontSize:11,color:'#9ca3af',fontWeight:500}}>Nicho:</span>
        <select style={{border:'1px solid #e5e7eb',borderRadius:6,padding:'5px 10px',fontSize:11,color:'#374151',outline:'none',cursor:'pointer',background:'#fff',fontFamily:'Inter,sans-serif'}} value={activeNiche} onChange={e=>setNiche(e.target.value)}>
          {NICHES.map(n=><option key={n.id} value={n.id}>{n.icon} {n.name}</option>)}
        </select>
        <button className="tbtn p" style={{marginLeft:'auto'}} onClick={newConv}>+ Nova Conversa</button>
      </div>
      <div className="inbox-layout">
        <div className="clist">
          <div className="clist-hd"><div className="clist-hd-t">Conversas <span style={{color:'#9ca3af',fontWeight:400,fontSize:11}}>({convs.length})</span></div></div>
          <div className="csearch"><span>🔍</span><span>Buscar...</span></div>
          <div className="citems">
            {convs.length===0&&<div style={{padding:'28px 14px',textAlign:'center',color:'#9ca3af',fontSize:12,lineHeight:2}}>Nenhuma conversa.<br/>Clique em "+ Nova Conversa".</div>}
            {convs.map((c,i)=>(<div key={c.id} className={`citem ${aid===c.id?'on':''}`} onClick={()=>{setAid(c.id);setError('');setHybMode(false);setNegMode(false);}}><div className="cav" style={{background:AVC[i%AVC.length]}}>{c.title.charAt(0).toUpperCase()}</div><div className="cinfo"><div className="cname">{c.title}</div><div className="cprev">{c.messages.slice(-1)[0]?.content?.slice(0,34)||'Sem mensagens'}...</div></div><div className="cright"><div className="ctime">{c.messages.length>0?fmt(c.messages.slice(-1)[0].created_at):fmtD(c.created_at)}</div>{c.outcome?<span className={`opill ${c.outcome==='won'?'op-won':'op-lost'}`}>{c.outcome==='won'?'Won':'Lost'}</span>:<span className="opill op-live">Live</span>}{!c.outcome&&c.messages.filter(m=>m.role==='user').length>0&&<div className="cunread">{c.messages.filter(m=>m.role==='user').length}</div>}</div></div>))}
          </div>
        </div>
        {!aid?(<div className="chat-panel"><div className="chat-empty"><div style={{fontSize:36,opacity:.3}}>💬</div><div style={{fontSize:13,fontWeight:600,color:'#374151'}}>Selecione uma conversa</div><div style={{fontSize:12,color:'#9ca3af',maxWidth:240,lineHeight:1.7}}>Ou clique em "+ Nova Conversa"</div></div></div>):(
          <div className="chat-panel">
            <div className="chat-tb">
              <div><div className="chat-name">{ac?.title}</div><div className="chat-st">{hybMode&&<span className="mbadge mb-h">🤝 Modo Humano</span>}{negMode&&<span className="mbadge mb-n">💰 Negociação</span>}{!hybMode&&!negMode&&<><div className="stdt" style={{background:'#10b981',boxShadow:'0 0 4px #10b981'}}/>Agente ativo · {ap.name}</>}</div></div>
              <div className="cact"><button className="abtn g" onClick={()=>setOutcome('won')}>✅ Won</button><button className="abtn ro" onClick={()=>setOutcome('lost')}>✗ Lost</button><button className="abtn po" onClick={analyzeLost} disabled={loading}>🔍 Analisar</button><button className="abtn oo" onClick={genProp} disabled={loading}>📄 Proposta</button><button className="tbtn" style={{padding:'5px 8px',fontSize:13}} onClick={e=>delConv(aid,e)}>🗑️</button></div>
            </div>
            <div className="kwbar"><span className="kwlbl">Sugeridas:</span>{cn.kws.slice(0,10).map(kw=><button key={kw} className="kwchip" onClick={()=>chipClick(kw)}>{kw}</button>)}</div>
            <div className="msgs-area">
              {msgs.length===0&&!loading&&<div style={{textAlign:'center',color:'#9ca3af',fontSize:12,marginTop:40,lineHeight:2}}>💬 Aguardando mensagem...</div>}
              {msgs.map((m,i)=>(<div key={m.id||i} className={`msg ${m.role==='user'?'u':''}`}><div className={`mav ${m.role==='assistant'?'ai':'u'}`}>{m.role==='assistant'?'🤖':'👤'}</div><div className="mbody">{m.mode==='neg'&&<div className="mtag">💰 Negociação Ativa</div>}{m.mode==='hyb'&&<div className="mtag">🤝 Modo Humano</div>}{m.mode==='rescue'&&<div className="mtag">📨 Follow-up</div>}<div className={`mbub ${m.role==='assistant'?'ai':'u'} ${m.mode==='neg'?'neg':''} ${m.mode==='hyb'?'hyb':''}`}>{m.content}</div><div className="mtime">{fmt(m.created_at)}</div></div></div>))}
              {loading&&<div className="typing-row"><div className="mav ai">🤖</div><div className="typing-bub"><span/><span/><span/></div></div>}
              <div ref={endRef}/>
            </div>
            <div className="inp-sec"><div className="inp-box"><textarea className="inp-f" rows={1} placeholder="Digite sua mensagem... (Enter para enviar)" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={hKey} disabled={loading}/><button className="send-btn" onClick={send} disabled={!input.trim()||loading}>▶</button></div><div className="inp-hint">Enter → enviar · Shift+Enter → nova linha</div></div>
          </div>
        )}
      </div>
    </div>
  );

  const renderAgents=()=>(<div className="content"><div className="sub-bar"><div className="page-sub">AI Agents</div><button className="tbtn p" onClick={()=>setShowAF(true)}>+ Novo Agente</button></div><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(255px,1fr))',gap:14}}>{personas.map(p=>(<div key={p.id} className={`agcrd ${p.is_active?'on':''}`}><div style={{display:'flex',alignItems:'center',gap:11,marginBottom:12}}><div style={{width:40,height:40,borderRadius:10,background:p.is_active?'#d1fae5':'#f3f4f6',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>🤖</div><div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:'#111827'}}>{p.name}</div><div style={{fontSize:11,color:'#9ca3af',marginTop:1}}>{NICHES.find(n=>n.id===p.niche)?.name||'Geral'}</div></div>{p.is_active&&<span className="pill pill-g">Ativo</span>}</div><div style={{fontSize:11,color:'#6b7280',lineHeight:1.5,marginBottom:12}}>{p.prompt.slice(0,88)}...</div><div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>{p.negotiate&&<span className="pill pill-o">💰 Negociação</span>}{p.hybrid&&<span className="pill pill-b">🤝 Modo Híbrido</span>}</div><div style={{display:'flex',gap:7}}>{!p.is_active&&<button className="tbtn p" style={{flex:1,justifyContent:'center',fontSize:11}} onClick={()=>activateP(p.id)}>Ativar</button>}{p.id!=='default'&&<button className="tbtn" style={{fontSize:11,color:'#ef4444',borderColor:'#fecaca'}} onClick={()=>delP(p.id)}>Remover</button>}</div></div>))}</div></div>);

  const renderKnowledge=()=>(<div className="content"><div className="sub-bar"><div className="page-sub">Knowledge Base</div></div><div className="ngrid">{NICHES.map(n=>(<div key={n.id} className={`ncard ${activeNiche===n.id?'on':''}`} onClick={()=>setNiche(n.id)}>{activeNiche===n.id&&<div className="natag">Ativo</div>}<span className="nem">{n.icon}</span><div className="nn">{n.name}</div><div className="ns">{n.badge} · {n.kws.length} kws</div></div>))}</div><div className="div"/><div style={{fontSize:14,fontWeight:700,color:'#111827',marginBottom:12}}>Palavras-chave — {cn.name}</div><div style={{display:'flex',flexWrap:'wrap',gap:7}}>{cn.kws.map(kw=>(<button key={kw} style={{padding:'5px 13px',border:'1px solid #e5e7eb',borderRadius:99,fontSize:11,fontWeight:500,color:'#6b7280',cursor:'pointer',background:'#fff',transition:'all .12s',fontFamily:'Inter,sans-serif'}} onMouseEnter={e=>{e.target.style.borderColor='#10b981';e.target.style.color='#10b981';e.target.style.background='#d1fae5';}} onMouseLeave={e=>{e.target.style.borderColor='#e5e7eb';e.target.style.color='#6b7280';e.target.style.background='#fff';}} onClick={()=>{newConv();setTimeout(()=>setInput(kw),160);}}>{kw}</button>))}</div></div>);

  const renderAnalytics=()=>(<div className="content"><div className="sub-bar"><div className="page-sub">Analytics</div></div><div className="mrow">{[{l:'Taxa de Conversão',v:`${rate}%`,ic:'📈',ci:'mci-g',bd:rate>40?'+5%':'-3%',up:rate>40},{l:'Vendas Ganhas',v:won,ic:'✅',ci:'mci-b',bd:'+12%',up:true},{l:'Vendas Perdidas',v:lost,ic:'❌',ci:'mci-p',bd:'',up:false},{l:'Total de Sessões',v:total,ic:'💬',ci:'mci-o',bd:'+8',up:true}].map(m=>(<div key={m.l} className="mc"><div className="mc-top"><div className={`mc-icon ${m.ci}`}>{m.ic}</div>{m.bd&&<span className={`mc-badge ${m.up?'mcb-up':'mcb-dn'}`}>{m.bd}</span>}</div><div className="mc-val">{m.v}</div><div className="mc-lbl">{m.l}</div></div>))}</div><div style={{display:'grid',gridTemplateColumns:'1fr 280px',gap:14}}><div className="card cp"><div className="ch"><div className="ct">Respostas ao longo do tempo</div></div><BarChart/></div><div className="card cp" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14}}><div style={{fontSize:13,fontWeight:600,color:'#111827'}}>Taxa de Conversão</div><Donut val={won} max={Math.max(total,1)} color="#10b981" size={110}/><div style={{width:'100%'}}>{[['Won',won,rate,'#10b981'],['Lost',lost,total>0?Math.round(lost/total*100):0,'#ef4444'],['Live',total-won-lost,total>0?Math.round((total-won-lost)/total*100):0,'#3b82f6']].map(([l,v,p,c])=>(<div key={l} className="pi"><div className="pi-top"><div className="pi-lbl" style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:7,height:7,borderRadius:'50%',background:c,display:'inline-block'}}/>{l}: {v}</div><div className="pi-pct">{p}%</div></div><div className="pi-bg"><div className="pi-f" style={{width:`${p}%`,background:c}}/></div></div>))}</div></div></div></div>);

  const renderSettings=()=>(<div className="content"><div className="sub-bar"><div className="page-sub">Settings</div></div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}><div className="card cp"><div className="ct" style={{marginBottom:14}}>🖥️ Status do Sistema</div><div style={{display:'flex',flexDirection:'column',gap:8}}>{[['🤖 Motor de IA (Groq)',serverOk==='ok'?'Online':serverOk==='err'?'Erro':'Verificando',serverOk==='ok'?'b-g':serverOk==='err'?'b-r':'b-gray'],['📦 Modelo Ativo','LLaMA 3.3 70B','b-b'],['💾 Dados salvos',`${total} conversas`,'b-g']].map(([l,v,bc])=>(<div key={l} style={{display:'flex',alignItems:'center',gap:10,padding:'11px 13px',background:'#f9fafb',borderRadius:8,border:'1px solid #e5e7eb'}}><div style={{fontSize:12,flex:1}}>{l}</div><span className={`badge ${bc}`}>{v}</span></div>))}{serverOk==='err'&&<div style={{padding:'10px 12px',background:'#fee2e2',borderRadius:8,fontSize:11,color:'#ef4444',lineHeight:1.6}}>⚠️ Servidor não responde. Verifique a variável <strong>GROQ_API_KEY</strong> no Vercel.</div>}</div></div><div className="card cp"><div className="ct" style={{marginBottom:14}}>🎯 Nicho Ativo</div><div style={{display:'flex',flexDirection:'column',gap:6}}>{NICHES.map(n=>(<div key={n.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 11px',borderRadius:7,border:`1.5px solid ${activeNiche===n.id?'#10b981':'#e5e7eb'}`,background:activeNiche===n.id?'#f0fdf4':'#fff',cursor:'pointer',transition:'all .15s'}} onClick={()=>setNiche(n.id)}><span style={{fontSize:17}}>{n.icon}</span><span style={{fontSize:12,fontWeight:600,color:'#111827',flex:1}}>{n.name}</span>{activeNiche===n.id&&<span className="pill pill-g">Ativo</span>}</div>))}</div></div></div></div>);

  const PAGES={dashboard:renderDashboard,inbox:renderInbox,agents:renderAgents,automations:renderAutomations,knowledge:renderKnowledge,analytics:renderAnalytics,settings:renderSettings};

  return(
    <div className="app">
      <div className="rail">
        <div className="rail-logo" onClick={()=>setPage('dashboard')}><svg width="16" height="16" viewBox="0 0 18 18" fill="none"><path d="M9 1.5L15.5 5.25V12.75L9 16.5L2.5 12.75V5.25L9 1.5Z" stroke="white" strokeWidth="1.3" fill="rgba(255,255,255,.15)"/><path d="M6.5 12V6.5L9 9.5V6.5M11.5 6.5V12" stroke="white" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg></div>
        {RAIL.map(n=><button key={n.id} className={`rail-btn ${page===n.id?'on':''}`} onClick={()=>setPage(n.id)} title={n.id}>{n.e}</button>)}
        <div className="rail-sp"/><button className="rail-btn" onClick={()=>setPage('settings')}>⚙️</button><button className="rail-btn">🌙</button>
      </div>
      <div className="sidebar">
        <div className="sb-top">
          <div className="sb-title">{PT[page]}<span style={{cursor:'pointer',color:'#9ca3af',fontSize:15}}>⇄</span></div>
          {page==='dashboard'&&(<div className="sb-sub-nav">{[['Hub',true],['Data sources',false],['Suggestions',false],['Playground',false],['Tasks',false],['Configure',false],['Train AI',false]].map(([l,a])=>(<div key={l} className={`sb-sub-item ${a?'on':''}`}><div className="sb-sub-dot" style={{background:a?'#10b981':'#e5e7eb'}}/>{l}</div>))}</div>)}
        </div>
        <div className="sb-brand">
          <div className="brand-box">
            <div className="brand-av">🤖</div>
            <div style={{flex:1}}><div className="brand-t">{BRAND_NAME}</div><div className="brand-s">{BRAND_TAGLINE}</div></div>
            <div className="status-orb" style={{background:sdStatus,boxShadow:serverOk==='ok'?`0 0 5px ${sdStatus}`:'none'}}/>
          </div>
        </div>
        <nav className="sb-nav">
          {NAV.map(n=>(<div key={n.id} className={`nav-item ${page===n.id?'on':''}`} onClick={()=>setPage(n.id)}><span className="nav-icon">{n.icon}</span>{n.label}{n.badge&&!n.badgeGray&&<span className="nav-badge">{n.badge}</span>}{n.badgeGray&&<span className="nav-badge gray">{n.badgeGray}</span>}{n.id==='automations'&&pendR>0&&<span className="nav-badge red">{pendR}</span>}</div>))}
        </nav>
        <div className="sb-foot">{[['⚙️','Settings'],['☀️','Aparência'],['🌙','Dark Mode']].map(([ic,l])=>(<div key={l} className="sb-foot-item" onClick={l==='Settings'?()=>setPage('settings'):undefined}><span style={{fontSize:14}}>{ic}</span><span>{l}</span></div>))}</div>
      </div>
      <main className="main">
        <div className="topbar"><div className="topbar-title">{PT[page]}</div><div className="topbar-right"><div className="tb-icon">🔍</div><div className="tb-icon">🔔</div><div className="uav">{BRAND_INITIAL}</div></div></div>
        {error&&<div className="err-bar">⚠️ {error}<button style={{marginLeft:'auto',background:'none',border:'none',cursor:'pointer',color:'#ef4444',fontSize:15}} onClick={()=>setError('')}>×</button></div>}
        {(PAGES[page]||renderDashboard)()}
      </main>
      {showAF&&(<div className="ovl" onClick={e=>e.target===e.currentTarget&&setShowAF(false)}><div className="modal"><div className="modal-t">Novo AI Agent</div><p className="modal-s">Configure um agente especializado</p><div className="fg"><label className="fl">NOME</label><input className="fi" placeholder="ex: Closador de Vendas" value={aForm.name} onChange={e=>setAForm(p=>({...p,name:e.target.value}))}/></div><div className="fg"><label className="fl">INSTRUÇÃO PRINCIPAL</label><textarea className="ft" rows={4} placeholder="Você é um especialista em..." value={aForm.prompt} onChange={e=>setAForm(p=>({...p,prompt:e.target.value}))}/></div><div className="tgrid"><div className={`topt ${aForm.negotiate?'on':''}`} onClick={()=>setAForm(p=>({...p,negotiate:!p.negotiate}))}><div className="tchk">{aForm.negotiate&&'✓'}</div><div className="tlbl"><strong>💰 Negociação</strong><span>Contra-propostas</span></div></div><div className={`topt ${aForm.hybrid?'on':''}`} onClick={()=>setAForm(p=>({...p,hybrid:!p.hybrid}))}><div className="tchk">{aForm.hybrid&&'✓'}</div><div className="tlbl"><strong>🤝 Modo Humano</strong><span>Tom empático</span></div></div></div><div className="mfoot"><button className="btn-c" onClick={()=>setShowAF(false)}>Cancelar</button><button className="btn-ok" onClick={saveAgent} disabled={!aForm.name||!aForm.prompt}>Criar</button></div></div></div>)}
      {showAna&&(<div className="ovl" onClick={e=>e.target===e.currentTarget&&setShowAna(null)}><div className="modal"><div className="modal-t">🔍 Análise de Venda Perdida</div><p className="modal-s">Sessão: <strong>{showAna.title}</strong></p>{showAna.data.resumo&&<div style={{background:'#fee2e2',border:'1px solid #fecaca',borderRadius:7,padding:'10px 13px',fontSize:12,color:'#374151',lineHeight:1.6,marginBottom:12}}><strong style={{color:'#ef4444'}}>Diagnóstico: </strong>{showAna.data.resumo}</div>}{showAna.data.objecoes?.length>0&&(<><div className="asec-t">❌ Objeções</div>{showAna.data.objecoes.map((o,i)=><div key={i} className="aitem">{o}</div>)}</>)}{showAna.data.recomendacoes?.length>0&&(<><div className="asec-t">✅ Recomendações</div>{showAna.data.recomendacoes.map((r,i)=><div key={i} className="aitem" style={{background:'#d1fae5'}}>{r}</div>)}</>)}{showAna.data.score_qualidade!=null&&<div className="score-d"><div className="score-n" style={{color:showAna.data.score_qualidade>6?'#10b981':'#ef4444'}}>{showAna.data.score_qualidade}<span style={{fontSize:20,fontWeight:400,color:'#9ca3af'}}>/10</span></div><div className="score-l">Score da Conversa</div></div>}<div className="mfoot"><button className="btn-c" onClick={()=>setShowAna(null)}>Fechar</button></div></div></div>)}
      {showProp&&(<div className="ovl" onClick={e=>e.target===e.currentTarget&&setShowProp(null)}><div className="modal" style={{maxWidth:640}}><div className="modal-t">📄 Proposta Comercial</div><p className="modal-s">Sessão: <strong>{showProp.title}</strong></p><div className="prop-frame" dangerouslySetInnerHTML={{__html:showProp.html}}/><div className="mfoot"><button className="btn-c" onClick={()=>setShowProp(null)}>Fechar</button><button className="btn-ok or" onClick={()=>{const w=window.open('','_blank');w.document.write(`<html><body>${showProp.html}</body></html>`);w.document.close();w.print();}}>🖨️ PDF</button></div></div></div>)}
      {toast&&<div className="toast">{toast}<span className="tx" onClick={()=>setToast('')}>×</span></div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
