<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Nexus AI — Sales Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f8;--white:#ffffff;
  --primary:#4361ee;--primary-h:#3451d1;--primary-l:#eef0fd;--primary-m:#c7ccf9;
  --green:#2ec4b6;--green-l:#e0f7f5;
  --blue:#4361ee;--blue-l:#eef0fd;
  --red:#ef4444;--red-l:#fee2e2;
  --orange:#f97316;--orange-l:#fff0e6;
  --purple:#8b5cf6;--purple-l:#f0ecff;
  --yellow:#f59e0b;--yellow-l:#fef3c7;
  --text:#111827;--text2:#374151;--text3:#6b7280;--text4:#9ca3af;
  --border:#e8eaf0;--border2:#f4f5f9;
  --shadow:0 2px 12px rgba(67,97,238,.06),0 1px 3px rgba(0,0,0,.05);
  --shadow-md:0 4px 20px rgba(67,97,238,.08),0 2px 8px rgba(0,0,0,.04);
  --shadow-lg:0 10px 40px rgba(67,97,238,.12),0 4px 12px rgba(0,0,0,.05);
  --r:14px;--r-sm:8px;--r-lg:18px;
}
html,body,#root{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:'Plus Jakarta Sans',sans-serif}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:99px}

/* ─── LAYOUT ─── */
.app{display:grid;grid-template-columns:68px 1fr;height:100vh;gap:0}

/* ─── ICON RAIL ─── */
.rail{background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:14px 0 18px;gap:4px;overflow:hidden;box-shadow:2px 0 8px rgba(0,0,0,.03)}
.rail-logo{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#4361ee,#3451d1);display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 4px 12px rgba(67,97,238,.35);flex-shrink:0}
.rl{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:17px;border:none;background:transparent;position:relative;margin:1px 0}
.rl:hover{background:var(--primary-l)}
.rl.on{background:var(--primary-l)}
.rl.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:22px;background:var(--primary);border-radius:0 3px 3px 0}
.rl-sp{flex:1}
.rl-tip{position:absolute;left:54px;background:#1f2937;color:#fff;font-size:11px;font-weight:600;padding:4px 9px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:50}
.rl:hover .rl-tip{opacity:1}

/* ─── MAIN ─── */
.main{display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ─── TOPBAR ─── */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 26px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:16px}
.tb-left{display:flex;align-items:center;gap:14px}
.tb-title{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.4px}
.tb-date{display:flex;align-items:center;gap:7px;padding:6px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:99px;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;transition:all .15s}
.tb-date:hover{border-color:var(--primary);color:var(--primary)}
.tb-date-dot{width:6px;height:6px;border-radius:50%;background:var(--primary)}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-ico{width:36px;height:36px;border-radius:10px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .15s}
.tb-ico:hover{background:var(--primary-l);border-color:var(--primary-m)}
.uav-tb{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#6c63ff);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 2px 8px rgba(67,97,238,.25)}

/* ─── CONTENT AREA ─── */
.content-wrap{flex:1;overflow-y:auto;display:flex;gap:0}
.content{flex:1;padding:22px 26px;overflow-y:auto;min-width:0}
.right-panel{width:288px;flex-shrink:0;background:var(--white);border-left:1px solid var(--border);overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:18px}
.rp-hidden{display:none}

/* ─── ERROR BAR ─── */
.err-bar{display:flex;align-items:center;gap:8px;padding:10px 26px;background:#fee2e2;border-bottom:1px solid #fecaca;font-size:12px;font-weight:500;color:var(--red);flex-shrink:0}

/* ─── SECTION HEADER ─── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.sec-title{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.sec-sub{font-size:11px;color:var(--text4);margin-top:2px}

/* ─── CARDS ─── */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.cp{padding:20px}
.ch{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.ct{font-size:13px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.cs{font-size:11px;color:var(--text4);margin-top:2px}
.cm{background:none;border:none;cursor:pointer;color:var(--text4);font-size:18px;padding:2px 6px;border-radius:6px;transition:all .15s;line-height:1}
.cm:hover{background:var(--bg);color:var(--text3)}

/* ─── METRIC CARDS ─── */
.mrow{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:18px}
.mc{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:22px 20px;box-shadow:var(--shadow);transition:all .2s;cursor:default}
.mc:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.mc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mc-ico{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px}
.mci-b{background:#eef0fd}.mci-g{background:#e0f7f5}.mci-p{background:#f0ecff}.mci-o{background:#fff0e6}.mci-r{background:#fee2e2}
.mc-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;display:flex;align-items:center;gap:3px}
.mcb-up{background:#e0f7f5;color:#0d9488}.mcb-dn{background:#fee2e2;color:#ef4444}.mcb-warn{background:#fff0e6;color:#f97316}
.mc-val{font-size:30px;font-weight:900;color:var(--text);letter-spacing:-1.5px;line-height:1;margin-bottom:6px}
.mc-lbl{font-size:12px;color:var(--text4);font-weight:500}
.mc-sub{font-size:11px;color:var(--text3);margin-top:5px;font-weight:500}

/* ─── GRID LAYOUTS ─── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
.grid-1-3{display:grid;grid-template-columns:1fr 220px;gap:16px;margin-bottom:18px}
.grid-3-2{display:grid;grid-template-columns:1fr 240px;gap:16px;margin-bottom:18px}

/* ─── BAR CHART ─── */
.bchart{display:flex;align-items:flex-end;gap:6px;height:130px;margin:8px 0}
.bcol{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;cursor:pointer;position:relative}
.bstack{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;width:100%;justify-content:flex-end}
.bseg{border-radius:5px 5px 0 0;min-height:4px;transition:all .3s;width:72%}
.bseg.ans{background:linear-gradient(180deg,#4361ee,#6c8af7)}
.bseg.ua{background:linear-gradient(180deg,#c7b8fd,#ddd5fe)}
.blbl{font-size:9px;color:var(--text4);font-weight:600;white-space:nowrap}
.chart-tip{position:absolute;background:#1f2937;color:#fff;padding:7px 10px;border-radius:8px;font-size:11px;pointer-events:none;z-index:10;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.bleg2{display:flex;gap:14px;margin-top:10px}.bleg2-i{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);font-weight:500}
.bleg2-d{width:8px;height:8px;border-radius:3px;flex-shrink:0}

/* ─── DONUT ─── */
.ring-wrap{display:flex;align-items:center;gap:16px;margin-top:12px}
.ring-cnt{position:relative;display:flex;align-items:center;justify-content:center}
.ring-mid{position:absolute;text-align:center}
.ring-pct{font-size:15px;font-weight:900;color:var(--text);line-height:1}

/* ─── PROGRESS BARS ─── */
.pi{margin-bottom:10px}
.pi-top{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px}
.pi-lbl{color:var(--text3);font-weight:500}.pi-pct{font-weight:700;color:var(--text2)}
.pi-bg{height:6px;background:var(--border2);border-radius:99px;overflow:hidden}
.pi-f{height:100%;border-radius:99px;transition:width .5s}

/* ─── INBOX ─── */
.inbox-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
.inbox-layout{flex:1;overflow:hidden;display:grid;grid-template-columns:280px 1fr;background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);margin:0 26px 18px;overflow:hidden}
.clist{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.clist-hd{padding:14px 16px;border-bottom:1px solid var(--border2);flex-shrink:0}
.clist-hd-t{font-size:13px;font-weight:700;color:var(--text)}
.csearch{display:flex;align-items:center;gap:7px;padding:9px 14px;border-bottom:1px solid var(--border2);font-size:12px;color:var(--text4);cursor:text;flex-shrink:0}
.citems{flex:1;overflow-y:auto}
.citem{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border2);transition:background .1s}
.citem:hover{background:var(--bg)}
.citem.on{background:var(--primary-l)}
.cav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;flex-shrink:0}
.cinfo{flex:1;min-width:0}
.cname{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cprev{font-size:11px;color:var(--text4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.cright{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.ctime{font-size:10px;color:var(--text4)}
.cunread{background:var(--primary);color:#fff;width:16px;height:16px;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.opill{font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px}
.op-won{background:#d1fae5;color:#059669}.op-lost{background:#fee2e2;color:#ef4444}.op-live{background:var(--primary-l);color:var(--primary)}
.chat-panel{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text4)}
.chat-tb{padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
.chat-name{font-size:13px;font-weight:700;color:var(--text)}
.chat-st{font-size:11px;color:var(--text4);display:flex;align-items:center;gap:5px;margin-top:2px}
.stdt{width:6px;height:6px;border-radius:50%;background:#10b981;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.cact{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.abtn{padding:5px 10px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text3);transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif}
.abtn.g{background:#d1fae5;border-color:#a7f3d0;color:#059669}.abtn.ro{background:var(--red-l);border-color:#fecaca;color:var(--red)}.abtn.po{background:var(--bg);border-color:var(--border)}.abtn.oo{background:var(--bg);border-color:var(--border)}.abtn:hover{opacity:.8}.abtn:disabled{opacity:.4;cursor:not-allowed}
.kwbar{display:flex;align-items:center;gap:6px;padding:7px 14px;overflow-x:auto;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--white)}
.kwbar::-webkit-scrollbar{display:none}
.kwlbl{font-size:10px;font-weight:600;color:var(--text4);white-space:nowrap}
.kwchip{padding:4px 10px;border:1.5px solid var(--border);border-radius:99px;font-size:10px;font-weight:600;cursor:pointer;background:#fff;color:var(--text3);white-space:nowrap;transition:all .12s;font-family:'Plus Jakarta Sans',sans-serif}
.kwchip:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-l)}
.msgs-area{flex:1;overflow-y:auto;padding:16px}
.msg{display:flex;gap:9px;margin-bottom:14px;animation:msgIn .2s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.u{flex-direction:row-reverse}
.mav{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;box-shadow:var(--shadow)}
.mav.ai{background:linear-gradient(135deg,var(--primary-l),#dde4ff)}
.mav.u{background:linear-gradient(135deg,#f3f4f6,#e5e7eb)}
.mbody{max-width:72%;display:flex;flex-direction:column;gap:2px}
.msg.u .mbody{align-items:flex-end}
.mtag{font-size:10px;font-weight:700;color:var(--text4);margin-bottom:3px}
.mbub{padding:10px 13px;border-radius:12px;font-size:12px;line-height:1.6;white-space:pre-wrap}
.mbub.ai{background:var(--white);border:1px solid var(--border);color:var(--text);border-radius:12px 12px 12px 3px;box-shadow:var(--shadow)}
.mbub.u{background:linear-gradient(135deg,var(--primary),var(--primary-h));color:#fff;border-radius:12px 12px 3px 12px}
.mbub.neg{background:linear-gradient(135deg,#fff7ed,#ffedd5);border-color:#fed7aa}
.mbub.hyb{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-color:#a7f3d0}
.mtime{font-size:10px;color:var(--text4);padding:0 4px}
.mbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px}
.mb-h{background:#dcfce7;color:#059669}.mb-n{background:#fff7ed;color:#f97316}
.typing-row{display:flex;gap:9px;align-items:center;margin-bottom:14px}
.typing-bub{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:10px 14px;display:flex;gap:5px;align-items:center}
.typing-bub span{width:7px;height:7px;border-radius:50%;background:var(--text4);animation:bounce .8s infinite}.typing-bub span:nth-child(2){animation-delay:.15s}.typing-bub span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.inp-sec{padding:12px 16px;background:var(--white);border-top:1px solid var(--border);flex-shrink:0}
.inp-box{display:flex;align-items:flex-end;gap:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:8px 10px;transition:all .2s}
.inp-box:focus-within{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(67,97,238,.08)}
.inp-f{flex:1;border:none;background:transparent;resize:none;font-size:12px;line-height:1.5;outline:none;max-height:100px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text)}
.send-btn{width:34px;height:34px;border-radius:9px;border:none;background:var(--primary);color:#fff;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;box-shadow:0 2px 8px rgba(67,97,238,.3)}
.send-btn:hover:not(:disabled){background:var(--primary-h);transform:scale(1.05)}
.send-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.inp-hint{font-size:10px;color:var(--text4);margin-top:6px;padding:0 4px}

/* ─── MISC COMPONENTS ─── */
.badge,.pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;display:inline-flex;align-items:center}
.b-green,.pill-g{background:#d1fae5;color:#059669}.b-red,.pill-r{background:#fee2e2;color:#ef4444}.b-blue,.pill-b{background:var(--primary-l);color:var(--primary)}.b-orange,.pill-o{background:#fff7ed;color:#f97316}.pill-gray{background:var(--border2);color:var(--text4)}

.tbtn{padding:7px 14px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid var(--border);background:var(--white);color:var(--text2);font-family:'Plus Jakarta Sans',sans-serif;display:inline-flex;align-items:center;gap:5px}
.tbtn:hover{background:var(--bg)}.tbtn.p{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 8px rgba(67,97,238,.3)}.tbtn.p:hover{background:var(--primary-h)}

.toggle{width:38px;height:22px;border-radius:99px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--primary)}.toggle.off{background:#d1d5db}
.toggle::after{content:'';position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:left .2s}
.toggle.on::after{left:19px}.toggle.off::after{left:3px}

.ovl{position:fixed;inset:0;background:rgba(17,24,39,.5);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:200;animation:fi .18s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--white);border-radius:18px;padding:28px;width:520px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:su .2s}
@keyframes su{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.modal-t{font-size:17px;font-weight:800;color:var(--text);margin-bottom:4px}
.modal-s{font-size:12px;color:var(--text3);margin-bottom:18px;line-height:1.6}
.fg{margin-bottom:14px}.fl{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block;letter-spacing:.2px}
.fi{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;font-size:12px;color:var(--text);outline:none;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif}
.fi:focus{background:#fff;border-color:var(--primary);box-shadow:0 0 0 3px rgba(67,97,238,.08)}
.ft{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;font-size:12px;color:var(--text);outline:none;transition:all .2s;resize:vertical;font-family:'Plus Jakarta Sans',sans-serif}
.ft:focus{background:#fff;border-color:var(--primary)}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.topt{padding:12px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;display:flex;gap:10px;align-items:flex-start;transition:all .15s}
.topt.on{border-color:var(--primary);background:var(--primary-l)}
.tchk{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--primary);flex-shrink:0;transition:all .15s}
.topt.on .tchk{background:var(--primary);border-color:var(--primary);color:#fff}
.tlbl{display:flex;flex-direction:column;gap:2px;font-size:12px;color:var(--text2)}.tlbl strong{font-weight:700}.tlbl span{font-size:11px;color:var(--text4)}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.btn-c{padding:9px 18px;background:#fff;border:1.5px solid var(--border);border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text3);font-family:'Plus Jakarta Sans',sans-serif}
.btn-c:hover{background:var(--bg)}
.btn-ok{padding:9px 22px;background:var(--primary);border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 2px 8px rgba(67,97,238,.3)}
.btn-ok:hover{background:var(--primary-h)}.btn-ok.or{background:#f97316}.btn-ok:disabled{opacity:.4;cursor:not-allowed}

async function callGroq(_ignored,messages,sys,temp=0.7){
  // API Key fica no servidor — usamos /api/chat com token JWT
  const tok = localStorage.getItem('nexus_token') || '';
  const r=await fetch('/api/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${tok}`},
    body:JSON.stringify({messages,system:sys,temperature:temp}),
  });
  if(r.status===401){localStorage.removeItem('nexus_token');window.location.href='/login.html';return;}
  if(!r.ok){const e=await r.json();throw new Error(e.error||'Erro no servidor');}
  return(await r.json()).content;
}

function detectHyb(msgs){const u=[...msgs].reverse().find(m=>m.role==='user');if(!u)return false;const t=u.content.toLowerCase();return['não sei','difícil','urgente','grave','muito caro','não tenho dinheiro','desempregado','doente','triste','ansioso','problema sério'].some(w=>t.includes(w));}
function detectNeg(msgs){const u=[...msgs].reverse().find(m=>m.role==='user');if(!u)return false;const t=u.content.toLowerCase();return['caro','preço','desconto','parcelar','parcela','orçamento','custo','valor','não posso pagar','barato','negociar','proposta'].some(w=>t.includes(w));}

function Donut({val,max,color,size=90,sw=10}){
  const r=(size-sw*2)/2,cx=size/2,cy=size/2,circ=2*Math.PI*r,pct=max>0?val/max:0,dash=circ*pct;
  return(
    <div style={{position:'relative',width:size,height:size,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#f3f4f6" strokeWidth={sw}/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={sw}
          strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={circ/4} strokeLinecap="round"
          style={{transition:'stroke-dasharray .5s'}}/>
      </svg>
      <div style={{position:'absolute',textAlign:'center'}}>
        <div style={{fontSize:size>90?18:14,fontWeight:800,color:'#111827',lineHeight:1}}>{max>0?Math.round(pct*100):0}%</div>
        <div style={{fontSize:9,color:'#9ca3af',marginTop:1}}>conv.</div>
      </div>
    </div>
  );
}

function TimeSavedDonut(){

  const segs=[{p:.45,col:'#34d399',off:0},{p:.3,col:'#60a5fa',off:.45},{p:.25,col:'#fbbf24',off:.75}];

        {segs.map((s,i)=>(

            strokeDasharray={`${c*s.p-2} ${c*(1-s.p)+2}`}
            strokeDashoffset={c*(1-s.off+.25)} strokeLinecap="round"/>

function BarChart(){
  const months=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const [tip,setTip]=useState(null);
  const data=months.map((m,i)=>({m,ans:Math.round(45+Math.sin(i)*20+Math.random()*30),ua:Math.round(10+Math.random()*22)}));
  const mx=Math.max(...data.map(d=>d.ans+d.ua));
  return(
    <div>
      <div style={{position:'relative'}}>
        {tip&&<div className="chart-tip" style={{top:-56,left:Math.max(0,tip.x-60)}}><div style={{fontWeight:700,marginBottom:2}}>{tip.d}</div><div style={{display:'flex',gap:10}}><span style={{color:'#34d399'}}>● {tip.ans}</span><span style={{color:'#fca5a5'}}>● {tip.ua}</span></div></div>}
        <div className="bchart">
          {data.map((d,i)=>(
            <div key={d.m} className="bcol"
              onMouseEnter={e=>{const rc=e.currentTarget.getBoundingClientRect(),rp=e.currentTarget.closest('.bchart').getBoundingClientRect();setTip({x:rc.left-rp.left+rc.width/2,d:`${d.m} 2024`,ans:d.ans,ua:d.ua});}}
              onMouseLeave={()=>setTip(null)}>
              <div className="bstack">
                <div className="bseg ans" style={{height:`${(d.ans/mx)*100}%`}}/>
                <div className="bseg ua"  style={{height:`${(d.ua/mx)*100}%`}}/>
              </div>
              <div className="blbl">{d.m}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="bleg2">
        <div className="bleg2-i"><div className="bleg2-d" style={{background:'#34d399'}}/>Respondidas</div>
        <div className="bleg2-i"><div className="bleg2-d" style={{background:'#fca5a5'}}/>Não respondidas</div>
      </div>
    </div>
  );
}

                  {c.outcome?<span className={`opill ${c.outcome==='won'?'op-won':'op-lost'}`}>{c.outcome==='won'?'Ganho':'Perdido'}</span>:<span className="opill op-live">Ativo</span>}

                </div>
              </div>
            ))}
          </div>
        </div>

        {!aid?(
          <div className="chat-panel">
            <div className="chat-empty">
              <div style={{fontSize:36,opacity:.3}}>💬</div>
              <div style={{fontSize:13,fontWeight:600,color:'var(--text2)'}}>Selecione uma conversa</div>
              <div style={{fontSize:12,color:'var(--text4)',maxWidth:240,lineHeight:1.7}}>Escolha uma conversa ou clique em "+ Nova Conversa"</div>

                  <div style={{fontSize:11,color:'var(--text3)',marginBottom:9,lineHeight:1.5}}>Grátis em <a href="https://console.groq.com" target="_blank" style={{color:'#10b981',fontWeight:600}}>console.groq.com</a></div>
                  <div style={{display:'flex',gap:6}}>
                    <input className="sinp" type="password" placeholder="gsk_..." value={apiInp} onChange={e=>setApiInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveKey()} style={{fontSize:11,padding:'7px 10px'}}/>
                    <button className="sbtn" onClick={saveKey} style={{fontSize:11,padding:'7px 14px'}}>Salvar</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        ):(
          <div className="chat-panel">
            <div className="chat-tb">
              <div>
                <div className="chat-name">{ac?.title}</div>
                <div className="chat-st">
                  {hybMode&&<span className="mbadge mb-h">🤝 Modo Humano</span>}
                  {negMode&&<span className="mbadge mb-n">💰 Negociação</span>}
                  {!hybMode&&!negMode&&<><div className="stdt" style={{background:'#10b981',boxShadow:'0 0 4px #10b981'}}/>Agente ativo · {ap.name}</>}
                </div>
              </div>

                <button className="abtn g" onClick={()=>setOutcome('won')}>✅ Ganho</button>
                <button className="abtn ro" onClick={()=>setOutcome('lost')}>✗ Perdido</button>
                <button className="abtn po" onClick={analyzeLost} disabled={loading}>🔍 Analisar</button>
                <button className="abtn oo" onClick={genProp} disabled={loading}>📄 Proposta</button>
                <button className="tbtn" style={{padding:'5px 8px',fontSize:13}} onClick={e=>delConv(aid,e)}>🗑️</button>
              </div>
            </div>
            <div className="kwbar">
              <span className="kwlbl">Sugeridas:</span>
              {cn.kws.slice(0,10).map(kw=><button key={kw} className="kwchip" onClick={()=>chipClick(kw)}>{kw}</button>)}
            </div>
            <div className="msgs-area">
              {msgs.length===0&&!loading&&<div style={{textAlign:'center',color:'var(--text4)',fontSize:12,marginTop:40,lineHeight:2}}>💬 Sessão iniciada<br/>Aguardando mensagem...</div>}
              {msgs.map((m,i)=>(
                <div key={m.id||i} className={`msg ${m.role==='user'?'u':''}`}>
                  <div className={`mav ${m.role==='assistant'?'ai':'u'}`}>{m.role==='assistant'?'🤖':'👤'}</div>
                  <div className="mbody">
                    {m.mode==='neg'&&<div className="mtag">💰 Negociação Ativa</div>}
                    {m.mode==='hyb'&&<div className="mtag">🤝 Modo Humano</div>}
                    {m.mode==='rescue'&&<div className="mtag">📨 Follow-up Automático</div>}
                    <div className={`mbub ${m.role==='assistant'?'ai':'u'} ${m.mode==='neg'?'neg':''} ${m.mode==='hyb'?'hyb':''}`}>{m.content}</div>
                    <div className="mtime">{fmt(m.created_at)}</div>
                  </div>
                </div>
              ))}
              {loading&&<div className="typing-row"><div className="mav ai">🤖</div><div className="typing-bub"><span/><span/><span/></div></div>}
              <div ref={endRef}/>

            <div className="inp-sec">
              <div className="inp-box">
                <textarea className="inp-f" rows={1} placeholder="Digite sua mensagem... (Enter para enviar)" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={hKey} disabled={loading}/>

              </div>
              <div className="inp-hint">Enter → enviar · Shift+Enter → nova linha</div>
            </div>
          </div>
        )}
      </div>
    </div>
  );

          {l:'Taxa de Conversão',v:`${rate}%`,ic:'📈',ci:'mci-g',bd:rate>40?'+5%':'-3%',up:rate>40},

          <div key={m.l} className="mc">

              <div className={`mc-icon ${m.ci}`}>{m.ic}</div>

            <div className="mc-lbl">{m.l}</div>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA//Z" style={{height:28,width:"auto",objectFit:"contain",marginRight:4}}/>
            <div className="tb-title">{PAGE_TITLE[page]}</div>
            <div className="tb-date">
              <div className="tb-date-dot"/>
              <span>{today}</span>
            </div>
          </div>
          <div className="tb-right">
            <div className="tb-ico" title="Buscar">🔍</div>
            <div className="tb-ico" title="Notificações" style={{position:'relative'}}>
              🔔
              {unread>0&&<div style={{position:'absolute',top:6,right:6,width:7,height:7,borderRadius:'50%',background:'var(--red)'}}/>}
            </div>
            {page!=='inbox'&&<button className="tbtn p" onClick={newConv} style={{padding:'7px 14px',fontSize:12}}>+ Nova Conversa</button>}
            <div className="uav-tb" id="uav-main">N</div>
          </div>
        </div>

        {error&&<div className="err-bar">⚠️ {error}<button style={{marginLeft:'auto',background:'none',border:'none',cursor:'pointer',color:'var(--red)',fontSize:15}} onClick={()=>setError('')}>×</button></div>}

        {/* CONTENT AREA */}
        <div className="content-wrap">
          {(PAGES[page]||renderDashboard)()}
        </div>
      </div>


      {/* MODAL — Agent Form */}
      {showAF&&(
        <div className="ovl" onClick={e=>e.target===e.currentTarget&&setShowAF(false)}>
          <div className="modal">
            <div className="modal-t">{editingAgent?'✏️ Editar Agente':'Novo AI Agent'}</div>
            <p className="modal-s">{editingAgent?'Atualize nome, prompt e capacidades do agente':'Configure um agente com personalidade e capacidades específicas'}</p>
            <div className="fg"><label className="fl">NOME DO AGENTE</label><input className="fi" placeholder="ex: Closador de Vendas" value={aForm.name} onChange={e=>setAForm(p=>({...p,name:e.target.value}))}/></div>
            <div className="fg"><label className="fl">INSTRUÇÃO PRINCIPAL (System Prompt)</label><textarea className="ft" rows={4} placeholder="Você é um especialista em vendas consultivas..." value={aForm.prompt} onChange={e=>setAForm(p=>({...p,prompt:e.target.value}))}/></div>
            <div className="tgrid">
              <div className={`topt ${aForm.negotiate?'on':''}`} onClick={()=>setAForm(p=>({...p,negotiate:!p.negotiate}))}>
                <div className="tchk">{aForm.negotiate&&'✓'}</div>
                <div className="tlbl"><strong>💰 Negociação Ativa</strong><span>Contra-propostas automáticas</span></div>
              </div>
              <div className={`topt ${aForm.hybrid?'on':''}`} onClick={()=>setAForm(p=>({...p,hybrid:!p.hybrid}))}>
                <div className="tchk">{aForm.hybrid&&'✓'}</div>
                <div className="tlbl"><strong>🤝 Modo Humano</strong><span>Tom empático automático</span></div>
              </div>
            </div>
            <div className="mfoot">
              <button className="btn-c" onClick={()=>{setShowAF(false);setEditingAgent(null);}}>Cancelar</button>
              <button className="btn-ok" onClick={saveAgent} disabled={!aForm.name||!aForm.prompt}>{editingAgent?'Salvar':'Criar Agente'}</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL — Analysis */}
      {showAutoF&&(
        <div className="ovl" onClick={e=>e.target===e.currentTarget&&setShowAutoF(false)}>
          <div className="modal">
            <div className="modal-t">{editingAuto?'✏️ Editar Automação':'Nova Automação'}</div>
            <p className="modal-s">Configure nome, descrição e ícone da automação</p>
            <div className="fg"><label className="fl">ÍCONE (emoji)</label><input className="fi" placeholder="⚡" value={autoForm.icon} onChange={e=>setAutoForm(p=>({...p,icon:e.target.value}))} style={{width:80}}/></div>
            <div className="fg"><label className="fl">NOME</label><input className="fi" placeholder="ex: Follow-up Automático" value={autoForm.name} onChange={e=>setAutoForm(p=>({...p,name:e.target.value}))}/></div>
            <div className="fg"><label className="fl">DESCRIÇÃO</label><textarea className="ft" rows={2} placeholder="Descreva o que essa automação faz..." value={autoForm.desc} onChange={e=>setAutoForm(p=>({...p,desc:e.target.value}))}/></div>
            <div className="mfoot">
              <button className="btn-c" onClick={()=>setShowAutoF(false)}>Cancelar</button>
              <button className="btn-ok" onClick={()=>{
                if(!autoForm.name)return;
                if(editingAuto){setAutos(p=>p.map(x=>x.id===editingAuto?{...x,...autoForm}:x));showT('✅ Automação atualizada!');}
                else{setAutos(p=>[...p,{id:uid(),...autoForm,active:false}]);showT('✅ Automação criada!');}
                setShowAutoF(false);setEditingAuto(null);
              }} disabled={!autoForm.name}>{editingAuto?'Salvar':'Criar'}</button>
            </div>
          </div>
        </div>
      )}

      {showAna&&(
        <div className="ovl" onClick={e=>e.target===e.currentTarget&&setShowAna(null)}>
          <div className="modal">
            <div className="modal-t">🔍 Análise de Venda Perdida</div>
            <p className="modal-s">Sessão: <strong>{showAna.title}</strong></p>
            {showAna.data.resumo&&<div style={{background:'var(--red-l)',border:'1px solid #fecaca',borderRadius:7,padding:'10px 13px',fontSize:12,color:'var(--text2)',lineHeight:1.6,marginBottom:12}}><strong style={{color:'var(--red)'}}>Diagnóstico: </strong>{showAna.data.resumo}</div>}
            {showAna.data.objecoes?.length>0&&(<><div className="asec-t">❌ Objeções não respondidas</div>{showAna.data.objecoes.map((o,i)=><div key={i} className="aitem">{o}</div>)}</>)}
            {showAna.data.recomendacoes?.length>0&&(<><div className="asec-t">✅ Recomendações</div>{showAna.data.recomendacoes.map((r,i)=><div key={i} className="aitem" style={{background:'var(--primary-l)'}}>{r}</div>)}</>)}
            {showAna.data.score_qualidade!=null&&(
              <div className="score-d">
                <div className="score-n" style={{color:showAna.data.score_qualidade>6?'var(--primary)':'var(--red)'}}>{showAna.data.score_qualidade}<span style={{fontSize:20,fontWeight:400,color:'var(--text4)'}}>/10</span></div>
                <div className="score-l">Score da Conversa</div>
              </div>
            )}
            <div className="mfoot"><button className="btn-c" onClick={()=>setShowAna(null)}>Fechar</button></div>
          </div>
        </div>
      )}

      {/* MODAL — Proposal */}
      {showProp&&(
        <div className="ovl" onClick={e=>e.target===e.currentTarget&&setShowProp(null)}>
          <div className="modal" style={{maxWidth:640}}>
            <div className="modal-t">📄 Proposta Comercial</div>
            <p className="modal-s">Sessão: <strong>{showProp.title}</strong></p>
            <div className="prop-frame" dangerouslySetInnerHTML={{__html:showProp.html}}/>
            <div className="mfoot">
              <button className="btn-c" onClick={()=>setShowProp(null)}>Fechar</button>
              <button className="btn-ok or" onClick={()=>{const w=window.open('','_blank');w.document.write(`<html><head><title>Proposta</title></head><body>${showProp.html}</body></html>`);w.document.close();w.print();}}>🖨️ Imprimir / PDF</button>
            </div>
          </div>
        </div>
      )}

      {toast&&<div className="toast">{toast}<span className="tx" onClick={()=>setToast('')}>×</span></div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
