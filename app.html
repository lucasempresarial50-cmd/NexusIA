<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Nexus AI — Sales Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6fa; --white:#ffffff;
  --primary:#10b981; --primary-h:#059669;
  --primary-l:#d1fae5; --primary-m:#a7f3d0;
  --purple:#8b5cf6; --purple-l:#ede9fe;
  --blue:#3b82f6; --blue-l:#dbeafe;
  --orange:#f97316; --orange-l:#ffedd5;
  --red:#ef4444; --red-l:#fee2e2;
  --yellow:#f59e0b; --yellow-l:#fef3c7;
  --text:#111827; --text2:#374151; --text3:#6b7280; --text4:#9ca3af;
  --border:#e5e7eb; --border2:#f3f4f6;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.04);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -2px rgba(0,0,0,.04);
  --r:10px; --r-sm:7px; --r-lg:14px;
}
html,body,#root{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:'Inter',sans-serif}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:99px}

/* ─── LAYOUT ─── */
.app{display:grid;grid-template-columns:52px 210px 1fr;height:100vh}

/* ─── ICON RAIL ─── */
.rail{background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:3px}
.rail-logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 2px 8px rgba(16,185,129,.3);flex-shrink:0}
.rail-btn{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;color:var(--text4);font-size:16px;border:none;background:transparent}
.rail-btn:hover{background:var(--border2);color:var(--text3)}
.rail-btn.on{background:var(--primary-l);color:var(--primary)}
.rail-sp{flex:1}

/* ─── SIDEBAR ─── */
.sidebar{background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-top{padding:16px 14px 10px;border-bottom:1px solid var(--border2);flex-shrink:0}
.sb-page-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sb-sub-nav{display:flex;flex-direction:column;gap:1px}
.sb-sub-item{display:flex;align-items:center;gap:8px;padding:6px 7px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text3);transition:all .15s;border:1px solid transparent}
.sb-sub-item:hover{background:var(--border2);color:var(--text2)}
.sb-sub-item.on{background:var(--primary-l);color:var(--primary);font-weight:600;border-color:var(--primary-m)}
.sb-sub-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* API strip */
.api-strip{padding:9px 12px;background:var(--border2);border-bottom:1px solid var(--border);flex-shrink:0}
.api-lbl{font-size:9px;font-weight:600;color:var(--text4);letter-spacing:.6px;text-transform:uppercase;margin-bottom:5px}
.api-row{display:flex;gap:5px}
.api-inp{flex:1;min-width:0;background:var(--white);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:11px;color:var(--text);outline:none;transition:all .2s}
.api-inp:focus,.api-inp.ok{border-color:var(--primary);box-shadow:0 0 0 2px rgba(16,185,129,.12)}
.api-save{padding:6px 10px;background:var(--primary);border:none;border-radius:6px;color:#fff;font-size:10px;font-weight:600;cursor:pointer;transition:background .2s;white-space:nowrap}
.api-save:hover{background:var(--primary-h)}
.api-hint{font-size:10px;color:var(--text4);margin-top:4px;display:flex;align-items:center;gap:4px}
.api-hint a{color:var(--primary);text-decoration:none}
.api-hint.ok{color:var(--primary)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--primary);flex-shrink:0;box-shadow:0 0 4px var(--primary)}

/* Main nav */
.sb-nav{flex:1;overflow-y:auto;padding:8px 10px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text3);transition:all .15s;margin-bottom:1px;border:1px solid transparent}
.nav-item:hover{background:var(--border2);color:var(--text2)}
.nav-item.on{background:var(--primary-l);color:var(--primary);font-weight:600;border-color:var(--primary-m)}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--primary);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;min-width:16px;text-align:center}
.nav-badge.gray{background:var(--border);color:var(--text4)}
.nav-badge.red{background:var(--red)}

/* SB Footer */
.sb-foot{border-top:1px solid var(--border);padding:8px 10px;flex-shrink:0}
.sb-foot-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text3);transition:all .15s}
.sb-foot-item:hover{background:var(--border2);color:var(--text2)}

/* ─── MAIN ─── */
.main{display:flex;flex-direction:column;overflow:hidden}

/* TOP BAR */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:52px;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.topbar-right{display:flex;align-items:center;gap:8px}
.tb-icon{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--text3);transition:all .15s}
.tb-icon:hover{background:var(--border2);color:var(--text2)}
.uav{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;cursor:pointer}
.tbtn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--white);color:var(--text2)}
.tbtn:hover{background:var(--border2)}
.tbtn.p{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600;box-shadow:0 1px 4px rgba(16,185,129,.25)}
.tbtn.p:hover{background:var(--primary-h)}
.tbtn:disabled{opacity:.4;cursor:not-allowed}

/* ─── CONTENT ─── */
.content{flex:1;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:16px}
.page-sub{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.4px}
.sub-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}

/* ─── CARDS ─── */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow)}
.cp{padding:16px}
.ch{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:13px}
.ct{font-size:13px;font-weight:600;color:var(--text)}
.cs{font-size:11px;color:var(--text4);margin-top:2px}
.cm{width:26px;height:26px;border-radius:5px;border:none;background:transparent;cursor:pointer;color:var(--text4);font-size:16px;display:flex;align-items:center;justify-content:center}
.cm:hover{background:var(--border2);color:var(--text3)}

/* ─── DASHBOARD 3-COL ─── */
.dash3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* conv bars */
.bleg{display:flex;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.bleg-i{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}
.bleg-d{width:8px;height:8px;border-radius:2px}
.cbars{display:flex;flex-direction:column;gap:5px}
.cbar{height:7px;border-radius:99px;background:var(--border2);overflow:hidden}
.cbar-f{height:100%;border-radius:99px}

/* ring */
.ring-wrap{display:flex;gap:13px;align-items:center;margin-top:10px}
.ring-cnt{position:relative;flex-shrink:0}
.ring-mid{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-pct{font-size:14px;font-weight:800;color:var(--text)}
.rtasks{display:flex;flex-direction:column;gap:6px;flex:1}
.rtask{display:flex;align-items:center;gap:7px;font-size:11px}
.rtask-d{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* answered */
.asec{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:7px}
.ai-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border2)}
.ai-item:last-child{border-bottom:none;padding-bottom:0}
.ai-av{width:29px;height:29px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.ai-info{flex:1;min-width:0}
.ai-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ai-msg{font-size:11px;color:var(--text4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.ai-right{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.ai-t{font-size:10px;font-weight:600;color:var(--text4)}
.badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px}
.b-green{background:var(--primary-l);color:var(--primary)}
.b-orange{background:var(--orange-l);color:var(--orange)}
.b-blue{background:var(--blue-l);color:var(--blue)}
.b-red{background:var(--red-l);color:var(--red)}
.b-gray{background:var(--border2);color:var(--text4)}
.see-all{font-size:11px;color:var(--primary);cursor:pointer;font-weight:500}
.see-all:hover{text-decoration:underline}

/* time saved */
.tsaved{display:flex;justify-content:center;margin:8px 0}
.tlist{display:flex;flex-direction:column;gap:7px;margin-top:8px}
.tlist-r{display:flex;align-items:center;justify-content:space-between;font-size:11px}
.tlist-d{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tlist-dt{color:var(--text3);flex:1;margin-left:7px}
.tlist-v{font-weight:600;color:var(--text2)}

/* ─── BAR CHART ─── */
.bchart{display:flex;align-items:flex-end;gap:3px;height:130px;margin-top:14px}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;gap:1px}
.bstack{flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:1px;width:100%}
.bseg{width:100%;border-radius:3px 3px 0 0;min-height:3px;cursor:pointer;transition:opacity .15s}
.bseg:hover{opacity:.8}
.bseg.ans{background:linear-gradient(180deg,#34d399,#10b981)}
.bseg.ua{background:#fecaca}
.blbl{font-size:8px;color:var(--text4);margin-top:4px}
.bleg2{display:flex;gap:14px;margin-top:10px}
.bleg2-i{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}
.bleg2-d{width:8px;height:8px;border-radius:50%}
.chart-tip{background:var(--text);color:#fff;border-radius:7px;padding:8px 12px;font-size:11px;line-height:1.6;white-space:nowrap;box-shadow:var(--shadow-lg);position:absolute;pointer-events:none;z-index:20}

/* ─── INBOX ─── */
.inbox-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
.inbox-layout{flex:1;overflow:hidden;display:grid;grid-template-columns:275px 1fr;background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);margin:0 22px 16px;overflow:hidden}
.clist{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.clist-hd{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.clist-hd-t{font-size:13px;font-weight:700;color:var(--text)}
.csearch{display:flex;align-items:center;gap:7px;background:var(--border2);border-radius:7px;padding:7px 10px;margin:8px 12px;cursor:text;flex-shrink:0}
.csearch span{font-size:11px;color:var(--text4)}
.citems{flex:1;overflow-y:auto}
.citem{padding:10px 14px;border-bottom:1px solid var(--border2);cursor:pointer;display:flex;gap:9px;transition:background .12s;position:relative}
.citem:hover{background:var(--border2)}
.citem.on{background:#ecfdf5;border-left:3px solid var(--primary)}
.cav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.cinfo{flex:1;min-width:0}
.cname{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cprev{font-size:11px;color:var(--text4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.cright{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.ctime{font-size:10px;color:var(--text4)}
.cunread{width:17px;height:17px;border-radius:50%;background:var(--primary);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.opill{font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px}
.op-won{background:var(--primary-l);color:var(--primary)}
.op-lost{background:var(--red-l);color:var(--red)}
.op-live{background:var(--blue-l);color:var(--blue)}

/* Chat panel */
.chat-panel{display:flex;flex-direction:column;overflow:hidden;background:#f9fafb}
.chat-tb{background:var(--white);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-name{font-size:13px;font-weight:700;color:var(--text)}
.chat-st{font-size:11px;color:var(--text4);margin-top:1px;display:flex;align-items:center;gap:5px}
.stdt{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cact{display:flex;align-items:center;gap:6px}
.abtn{display:flex;align-items:center;gap:4px;padding:5px 11px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--white);color:var(--text2)}
.abtn:hover{background:var(--border2)}
.abtn.g{background:var(--primary);color:#fff;border-color:var(--primary)}
.abtn.g:hover{background:var(--primary-h)}
.abtn.ro{border-color:#fca5a5;color:var(--red)}
.abtn.ro:hover{background:var(--red-l)}
.abtn.po{border-color:#c4b5fd;color:var(--purple)}
.abtn.po:hover{background:var(--purple-l)}
.abtn.oo{border-color:#fed7aa;color:var(--orange)}
.abtn.oo:hover{background:var(--orange-l)}
.abtn:disabled{opacity:.35;cursor:not-allowed}
.mbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:600}
.mb-h{background:var(--blue-l);color:var(--blue)}
.mb-n{background:var(--orange-l);color:var(--orange)}

.kwbar{padding:7px 14px;background:var(--white);border-bottom:1px solid var(--border2);display:flex;gap:5px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;align-items:center}
.kwbar::-webkit-scrollbar{display:none}
.kwlbl{font-size:10px;font-weight:600;color:var(--text4);white-space:nowrap;margin-right:3px}
.kwchip{padding:3px 10px;border:1px solid var(--border);border-radius:99px;font-size:10px;font-weight:500;color:var(--text3);cursor:pointer;white-space:nowrap;background:var(--white);transition:all .12s;flex-shrink:0}
.kwchip:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-l)}

.msgs-area{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:8px;align-items:flex-end;animation:mi .18s ease-out}
@keyframes mi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg.u{flex-direction:row-reverse}
.mav{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;font-weight:700;color:#fff}
.mav.ai{background:linear-gradient(135deg,#10b981,#059669)}
.mav.u{background:linear-gradient(135deg,#6366f1,#4f46e5)}
.mbody{display:flex;flex-direction:column}
.mtag{font-size:10px;font-weight:600;color:var(--text4);margin-bottom:3px;display:flex;align-items:center;gap:4px}
.mbub{padding:10px 13px;border-radius:12px;font-size:12.5px;line-height:1.65;white-space:pre-wrap;max-width:500px}
.mbub.ai{background:var(--white);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:3px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.mbub.u{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;border-bottom-right-radius:3px}
.mbub.neg{background:#fff7ed;border:1px solid #fed7aa;border-left:3px solid var(--orange)}
.mbub.hyb{background:#eff6ff;border:1px solid #bfdbfe;border-left:3px solid var(--blue)}
.mtime{font-size:10px;color:var(--text4);margin-top:3px;padding:0 2px}
.msg.u .mtime{text-align:right}
.typing-row{display:flex;gap:8px;align-items:flex-end}
.typing-bub{padding:12px 14px;background:var(--white);border:1px solid var(--border);border-radius:12px;border-bottom-left-radius:3px;display:flex;align-items:center;gap:4px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.typing-bub span{width:6px;height:6px;border-radius:50%;background:var(--text4);animation:tb 1.2s infinite}
.typing-bub span:nth-child(2){animation-delay:.2s}
.typing-bub span:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,80%,100%{transform:scale(.55);opacity:.4}40%{transform:scale(1);opacity:1}}

.inp-sec{padding:11px 14px;background:var(--white);border-top:1px solid var(--border);flex-shrink:0}
.inp-box{display:flex;align-items:flex-end;gap:8px;background:var(--border2);border:1px solid var(--border);border-radius:var(--r);padding:8px 11px;transition:all .2s}
.inp-box:focus-within{background:var(--white);border-color:var(--primary);box-shadow:0 0 0 3px rgba(16,185,129,.1)}
.inp-f{flex:1;background:transparent;border:none;outline:none;font-size:13px;color:var(--text);resize:none;max-height:90px;line-height:1.5}
.inp-f::placeholder{color:var(--text4)}
.send-btn{width:32px;height:32px;background:var(--primary);border:none;border-radius:7px;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;box-shadow:0 1px 4px rgba(16,185,129,.3)}
.send-btn:hover:not(:disabled){background:var(--primary-h);transform:scale(1.05)}
.send-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.inp-hint{font-size:10px;color:var(--text4);text-align:center;margin-top:5px}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:24px;color:var(--text4);text-align:center}

/* ─── METRICS ─── */
.mrow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.mc{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
.mc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.mc-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.mci-g{background:var(--primary-l)}
.mci-b{background:var(--blue-l)}
.mci-p{background:var(--purple-l)}
.mci-o{background:var(--orange-l)}
.mc-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px}
.mcb-up{background:#dcfce7;color:#16a34a}
.mcb-dn{background:var(--red-l);color:var(--red)}
.mc-val{font-size:24px;font-weight:800;color:var(--text);letter-spacing:-1px;line-height:1}
.mc-lbl{font-size:11px;color:var(--text4);margin-top:4px;font-weight:500}

/* ─── TABLE ─── */

async function callGroq(_ignored,messages,sys,temp=0.7){
  // API Key fica no servidor — usamos /api/chat com token JWT
  const tok = localStorage.getItem('nexus_token') || '';
  const r=await fetch('/api/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${tok}`},
    body:JSON.stringify({messages,system:sys,temperature:temp}),
  });
  if(r.status===401){localStorage.removeItem('nexus_token');window.location.href='/login.html';return;}
  if(!r.ok){const e=await r.json();throw new Error(e.error||'Erro no servidor');}
  return(await r.json()).content;
}

function detectHyb(msgs){const u=[...msgs].reverse().find(m=>m.role==='user');if(!u)return false;const t=u.content.toLowerCase();return['não sei','difícil','urgente','grave','muito caro','não tenho dinheiro','desempregado','doente','triste','ansioso','problema sério'].some(w=>t.includes(w));}
function detectNeg(msgs){const u=[...msgs].reverse().find(m=>m.role==='user');if(!u)return false;const t=u.content.toLowerCase();return['caro','preço','desconto','parcelar','parcela','orçamento','custo','valor','não posso pagar','barato','negociar','proposta'].some(w=>t.includes(w));}

function Donut({val,max,color,size=90,sw=10}){
  const r=(size-sw*2)/2,cx=size/2,cy=size/2,circ=2*Math.PI*r,pct=max>0?val/max:0,dash=circ*pct;
  return(
    <div style={{position:'relative',width:size,height:size,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#f3f4f6" strokeWidth={sw}/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={sw}
          strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={circ/4} strokeLinecap="round"
          style={{transition:'stroke-dasharray .5s'}}/>
      </svg>
      <div style={{position:'absolute',textAlign:'center'}}>
        <div style={{fontSize:size>90?18:14,fontWeight:800,color:'#111827',lineHeight:1}}>{max>0?Math.round(pct*100):0}%</div>
        <div style={{fontSize:9,color:'#9ca3af',marginTop:1}}>conv.</div>
      </div>
    </div>
  );
}

function TimeSavedDonut(){
  const sz=110,cx=55,cy=55,r=38,sw=12,c=2*Math.PI*r;
  const segs=[{p:.45,col:'#34d399',off:0},{p:.3,col:'#60a5fa',off:.45},{p:.25,col:'#fbbf24',off:.75}];

        {segs.map((s,i)=>(
          <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.col} strokeWidth={sw}
            strokeDasharray={`${c*s.p-2} ${c*(1-s.p)+2}`}
            strokeDashoffset={c*(1-s.off+.25)} strokeLinecap="round"/>
        ))}

function BarChart(){
  const months=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const [tip,setTip]=useState(null);
  const data=months.map((m,i)=>({m,ans:Math.round(45+Math.sin(i)*20+Math.random()*30),ua:Math.round(10+Math.random()*22)}));
  const mx=Math.max(...data.map(d=>d.ans+d.ua));
  return(
    <div>
      <div style={{position:'relative'}}>
        {tip&&<div className="chart-tip" style={{top:-56,left:Math.max(0,tip.x-60)}}><div style={{fontWeight:700,marginBottom:2}}>{tip.d}</div><div style={{display:'flex',gap:10}}><span style={{color:'#34d399'}}>● {tip.ans}</span><span style={{color:'#fca5a5'}}>● {tip.ua}</span></div></div>}
        <div className="bchart">
          {data.map((d,i)=>(
            <div key={d.m} className="bcol"
              onMouseEnter={e=>{const rc=e.currentTarget.getBoundingClientRect(),rp=e.currentTarget.closest('.bchart').getBoundingClientRect();setTip({x:rc.left-rp.left+rc.width/2,d:`${d.m} 2024`,ans:d.ans,ua:d.ua});}}
              onMouseLeave={()=>setTip(null)}>
              <div className="bstack">
                <div className="bseg ans" style={{height:`${(d.ans/mx)*100}%`}}/>
                <div className="bseg ua"  style={{height:`${(d.ua/mx)*100}%`}}/>
              </div>
              <div className="blbl">{d.m}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="bleg2">
        <div className="bleg2-i"><div className="bleg2-d" style={{background:'#34d399'}}/>Respondidas</div>
        <div className="bleg2-i"><div className="bleg2-d" style={{background:'#fca5a5'}}/>Não respondidas</div>
      </div>
    </div>
  );
}

    const pl = document.getElementById('user-plan-sb');

    if(pl) pl.textContent = (u.plan||'starter').toUpperCase();
    const ns = JSON.parse(localStorage.getItem('nexus_notif_'+u.id)||'[]');
    const unr = ns.filter(n=>!n.read);
    if(unr.length>0){
      const last = unr[unr.length-1];
      const bc = last.type==='error'?'#ef4444':last.type==='warning'?'#f97316':last.type==='success'?'#10b981':'#3b82f6';
      setTimeout(()=>{
        const d=document.createElement('div');
        d.style.cssText='position:fixed;top:16px;right:16px;background:#fff;border:1.5px solid '+bc+';border-radius:11px;padding:13px 16px;font-family:Inter,sans-serif;font-size:12px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.12);max-width:300px;';
        d.innerHTML='<div style="font-weight:700;color:#111;margin-bottom:3px">'+last.title+'</div><div style="color:#6b7280;line-height:1.5">'+last.body+'</div><div style="font-size:10px;color:#9ca3af;margin-top:6px"><span>Da equipe Nexus AI</span></div>';
        document.body.appendChild(d);
        setTimeout(()=>d.remove(),8000);
        const marked = ns.map(n=>({...n,read:true}));
        localStorage.setItem('nexus_notif_'+u.id, JSON.stringify(marked));
        setNotifs(marked);
      },1500);
    }
  },[]);
  useEffect(()=>sv({apiKey,convs,personas,rescueQ,activeNiche,autos}),[apiKey,convs,personas,rescueQ,activeNiche,autos]);
  useEffect(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),[convs,loading,aid]);

  const showT=m=>{setToast(m);setTimeout(()=>setToast(''),3000);};
  const ac=convs.find(c=>c.id===aid);
  const ap=personas.find(p=>p.is_active)||personas[0];
  const msgs=ac?.messages||[];
  const hasKey=true; // Auth via token
  const cn=NICHES.find(n=>n.id===activeNiche)||NICHES[0];
  const total=convs.length,won=convs.filter(c=>c.outcome==='won').length,lost=convs.filter(c=>c.outcome==='lost').length;
  const rate=total>0?Math.round((won/total)*100):0;
  const pendR=rescueQ.filter(x=>x.status==='pending').length;
  const liveC=convs.filter(c=>!c.outcome).length;

  const resetTimer=useCallback(()=>{
    clearTimeout(iRef.current);if(!aid)return;
    iRef.current=setTimeout(()=>{
      const c=convs.find(x=>x.id===aid);if(!c||c.outcome)return;
      setRescueQ(q=>{if(q.find(x=>x.convId===aid))return q;showT('⏰ Cliente inativo — adicionado à fila de resgate');return[{id:uid(),convId:aid,title:c.title,lastMsg:ts(),status:'pending'},...q];});
    },120000);
  },[aid,convs]);
  useEffect(()=>{resetTimer();return()=>clearTimeout(iRef.current);},[msgs.length]);

  const saveKey=()=>{const c=apiInp.replace(/[^\x20-\x7E]/g,'').trim();if(!c){showT('❌ Chave inválida');return;}setApiKey(c);setApiInp('');showT('✅ Conectado com sucesso!');};
  const newConv=()=>{if(!hasKey)return;const c={id:uid(),title:'Nova conversa',messages:[],outcome:null,created_at:ts(),niche:activeNiche};setConvs(p=>[c,...p]);setAid(c.id);setPage('inbox');setError('');setHybMode(false);setNegMode(false);};
  const delConv=(id,e)=>{e?.stopPropagation();setConvs(p=>p.filter(c=>c.id!==id));if(aid===id)setAid(null);showT('Conversa removida');};
  const setOutcome=o=>{setConvs(p=>p.map(c=>c.id===aid?{...c,outcome:o}:c));showT(o==='won'?'🎉 Venda registrada!':'📊 Marcado como perdida');};

  const send=async()=>{
    if(!input.trim()||loading||!aid||!hasKey)return;
    const text=input.trim();setInput('');setError('');
    const um={id:uid(),role:'user',content:text,created_at:ts()};
    setConvs(prev=>prev.map(c=>{if(c.id!==aid)return c;const nt=c.title==='Nova conversa'?text.slice(0,42):c.title;return{...c,title:nt,messages:[...c.messages,um]};}));
    const allM=[...msgs,um];
    const isH=ap.hybrid&&autos.find(a=>a.id==='a2')?.active&&detectHyb(allM);
    const isN=ap.negotiate&&autos.find(a=>a.id==='a1')?.active&&detectNeg(allM);
    setHybMode(isH);setNegMode(isN);setLoading(true);
    try{
      let sp=ap.prompt;
      if(isH)sp+='\n\n[HYBRID MODE] Cliente em situação delicada. Seja extremamente empático. Tom humano, frases curtas, perguntas abertas. NÃO force vendas agora.';
      if(isN)sp+='\n\n[NEGOTIATION MODE] Cliente resistente a preço. Faça contra-proposta com 2-3 opções: alternativa acessível, parcelamento ou desconto. Seja específico.';
      const hist=[...msgs,um].map(m=>({role:m.role,content:m.content}));
      const aiT=await callGroq(apiKey,hist,sp);
      const am={id:uid(),role:'assistant',content:aiT,created_at:ts(),mode:isH?'hyb':isN?'neg':'normal'};
      setConvs(prev=>prev.map(c=>c.id===aid?{...c,messages:[...c.messages,am]}:c));
      resetTimer();
    }catch(e){setError('Erro: '+e.message);if(e.message.includes('401'))setApiKey('');}
    finally{setLoading(false);}
  };
  const hKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};
  const chipClick=kw=>{if(!hasKey)return;if(!aid){newConv();setTimeout(()=>setInput(kw),160);}else setInput(kw);};

  const analyzeLost=async()=>{
    if(!ac||!hasKey)return;setLoading(true);
    try{
      const tr=msgs.map(m=>`${m.role==='user'?'CLIENTE':'IA'}: ${m.content}`).join('\n');
      const raw=await callGroq(apiKey,[{role:'user',content:`Analise esta conversa onde o cliente NÃO comprou.\n\n${tr}\n\nRetorne APENAS JSON:\n{"objecoes":["..."],"recomendacoes":["..."],"pontos_positivos":["..."],"score_qualidade":7,"resumo":"..."}`}],'Analista sênior de vendas. JSON. Português.',0.2);
      let data;try{data=JSON.parse(raw.replace(/```json|```/g,'').trim());}catch{data={resumo:raw};}
      setShowAna({title:ac.title,data});
    }catch(e){setError('Erro: '+e.message);}finally{setLoading(false);}
  };

  const genProp=async()=>{
    if(!ac||!hasKey)return;setLoading(true);
    try{
      const tr=msgs.map(m=>`${m.role==='user'?'CLIENTE':'IA'}: ${m.content}`).join('\n');
      const html=await callGroq(apiKey,[{role:'user',content:`Gere proposta comercial em HTML com estilos inline.\nConversa:\n${tr}\nInclua: título, data, necessidades, solução, investimento, próximos passos. Visual limpo.`}],'Especialista em propostas. HTML inline. Português.',0.4);
      setShowProp({title:ac.title,html});
    }catch(e){setError('Erro: '+e.message);}finally{setLoading(false);}
  };

  const sendRescue=async(item)=>{
    setRescueQ(q=>q.map(x=>x.id===item.id?{...x,status:'sending'}:x));
    try{
      const c=convs.find(x=>x.id===item.convId);
      const last=c?.messages.slice(-3).map(m=>`${m.role==='user'?'Cliente':'IA'}: ${m.content}`).join('\n')||'';
      const msg=await callGroq(apiKey,[{role:'user',content:`Follow-up para cliente que abandonou.\nÚltima interação:\n${last}\nEmpático, incentivo de retorno. Máximo 2 frases.`}],'Especialista em recuperação de clientes. Português.',0.8);
      setRescueQ(q=>q.map(x=>x.id===item.id?{...x,status:'sent',message:msg,sentAt:ts()}:x));
      setConvs(prev=>prev.map(c=>c.id===item.convId?{...c,messages:[...c.messages,{id:uid(),role:'assistant',content:`📨 Follow-up automático:\n\n${msg}`,created_at:ts(),mode:'rescue'}]}:c));
      setAid(item.convId);setPage('inbox');showT('📨 Follow-up enviado!');
    }catch(e){setError('Erro: '+e.message);setRescueQ(q=>q.map(x=>x.id===item.id?{...x,status:'pending'}:x));}
  };

  const saveAgent=()=>{if(!aForm.name||!aForm.prompt)return;setPersonas(p=>[...p,{id:uid(),...aForm,is_active:false}]);setShowAF(false);setAForm({name:'',prompt:'',niche:'sales',negotiate:true,hybrid:true});showT('✅ Agente criado!');};
  const activateP=id=>{setPersonas(p=>p.map(x=>({...x,is_active:x.id===id})));showT('✅ Agente ativado');};
  const delP=id=>{setPersonas(p=>{const n=p.filter(x=>x.id!==id);if(n.length&&!n.find(x=>x.is_active))n[0].is_active=true;return n;});};

  const setNiche=id=>{setActiveNiche(id);const n=NICHES.find(x=>x.id===id);if(n)setPersonas(p=>p.map(x=>x.is_active?{...x,prompt:n.prompt,niche:n.id}:x));showT(`✅ Nicho "${n?.name}" ativado`);};

  const NAV=[
    {id:'dashboard',icon:'⊞',label:'Painel'},
    {id:'inbox',icon:'✉',label:'Mensagens',badge:liveC||null},
    {id:'agents',icon:'🤖',label:'Agentes IA'},
    {id:'automations',icon:'⚡',label:'Automações',badgeGray:autos.filter(a=>a.active).length||null},
    {id:'knowledge',icon:'📚',label:'Base de Conhecimento'},
    {id:'analytics',icon:'📊',label:'Análises'},
    {id:'settings',icon:'⚙',label:'Configurações'},
  ];

  const RAIL=[
    {id:'dashboard',e:'⊞'},{id:'inbox',e:'✉'},{id:'agents',e:'🤖'},
    {id:'automations',e:'⚡'},{id:'knowledge',e:'📚'},{id:'analytics',e:'📊'},
  ];

  const PAGE_TITLE={dashboard:'Painel',inbox:'Mensagens',agents:'Agentes IA',automations:'Automações',knowledge:'Base de Conhecimento',analytics:'Análises',settings:'Configurações'};

  /* ── DASHBOARD ── */
  const renderDashboard=()=>(
    <div className="content">
      <div className="sub-bar">
        <div className="page-sub">Hub</div>
        <div style={{display:'flex',gap:8}}>
          <button className="tbtn">🧪 Testar Agente</button>

        </div>
      </div>

      <div className="dash3">
        {/* Card 1 — Conversations limit */}
        <div className="card cp">
          <div className="ch"><div><div className="ct">Conversations limit</div><div className="cs">Conversas no último mês · {total} total</div></div><button className="cm">···</button></div>
          <div className="bleg">
            {[['#10b981','Semanal'],['#3b82f6','Mensal'],['#8b5cf6','Anual']].map(([c,l])=>(
              <div key={l} className="bleg-i"><div className="bleg-d" style={{background:c}}/>{l}</div>
            ))}
          </div>
          <div className="cbars">
            {[['#10b981',72],['#3b82f6',55],['#8b5cf6',88]].map(([c,w],i)=>(

          {convs.length===0&&<div style={{fontSize:11,color:'var(--text4)',padding:'12px 0',textAlign:'center'}}>Nenhuma conversa ainda.<br/>Clique em "+ Nova Conversa".</div>}
          {convs.slice(0,3).map((c,i)=>(

              <div className="ai-av" style={{background:AVC[(i+1)%AVC.length]}}>{c.title.charAt(0).toUpperCase()}</div>
              <div className="ai-info"><div className="ai-name">{c.title.slice(0,22)}</div><div className="ai-msg">{c.messages.slice(-1)[0]?.content?.slice(0,26)||'...'}...</div></div>
              <div className="ai-right">
                <span className="ai-t">{c.messages.length}m</span>

              <div className="bleg2-i"><div className="bleg2-d" style={{background:'#34d399'}}/>Respondidas</div>

              <option>Diário</option><option>Semanal</option><option>Mensal</option>
            </select>
          </div>
        </div>
        <BarChart/>
      </div>
    </div>
  );

  /* ── INBOX ── */
  const renderInbox=()=>(
    <div className="inbox-wrap">
      <div style={{padding:'8px 22px 0',display:'flex',alignItems:'center',gap:8,flexShrink:0}}>

            {convs.map((c,i)=>(
              <div key={c.id} className={`citem ${aid===c.id?'on':''}`} onClick={()=>{setAid(c.id);setError('');setHybMode(false);setNegMode(false);}}>
                <div className="cav" style={{background:AVC[i%AVC.length]}}>{c.title.charAt(0).toUpperCase()}</div>
                <div className="cinfo">

                </div>
                <div className="cright">

                  {!c.outcome&&c.messages.filter(m=>m.role==='user').length>0&&<div className="cunread">{c.messages.filter(m=>m.role==='user').length}</div>}

                <div style={{background:'#f0fdf4',border:'1px solid #a7f3d0',borderRadius:10,padding:'14px 16px',maxWidth:300,marginTop:8}}>

                  <div style={{fontSize:11,color:'var(--text3)',marginBottom:9,lineHeight:1.5}}>Grátis em <a href="https://console.groq.com" target="_blank" style={{color:'#10b981',fontWeight:600}}>console.groq.com</a></div>

                    <input className="sinp" type="password" placeholder="gsk_..." value={apiInp} onChange={e=>setApiInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveKey()} style={{fontSize:11,padding:'7px 10px'}}/>

                </div>
              ))}
              {loading&&<div className="typing-row"><div className="mav ai">🤖</div><div className="typing-bub"><span/><span/><span/></div></div>}
              <div ref={endRef}/>
            </div>
            <div className="inp-sec">
              <div className="inp-box">
                <textarea className="inp-f" rows={1} placeholder="Digite sua mensagem... (Enter para enviar)" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={hKey} disabled={loading}/>
                <button className="send-btn" onClick={send} disabled={!input.trim()||loading}>▶</button>
              </div>
              <div className="inp-hint">Enter → enviar · Shift+Enter → nova linha</div>
            </div>
          </div>
        )}
      </div>
    </div>
  );

  /* ── AGENTS ── */
  const renderAgents=()=>(
    <div className="content">
      <div className="sub-bar"><div className="page-sub">Agentes IA</div><button className="tbtn p" onClick={()=>setShowAF(true)}>+ Novo Agente</button></div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(255px,1fr))',gap:14}}>
        {personas.map((p,i)=>(
          <div key={p.id} className={`agcrd ${p.is_active?'on':''}`}>
            <div style={{display:'flex',alignItems:'center',gap:11,marginBottom:12}}>
              <div style={{width:40,height:40,borderRadius:10,background:p.is_active?'var(--primary-l)':'var(--border2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>🤖</div>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{p.name}</div><div style={{fontSize:11,color:'var(--text4)',marginTop:1}}>{NICHES.find(n=>n.id===p.niche)?.name||'Geral'}</div></div>
              {p.is_active&&<span className="pill pill-g">Ativo</span>}
            </div>
            <div style={{fontSize:11,color:'var(--text3)',lineHeight:1.5,marginBottom:12}}>{p.prompt.slice(0,88)}...</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>
              {p.negotiate&&<span className="pill pill-o">💰 Negociação</span>}
              {p.hybrid&&<span className="pill pill-b">🤝 Modo Híbrido</span>}

            <div style={{display:'flex',gap:7}}>

            </div>
          </div>
        ))}
      </div>
    </div>
  );

  /* ── AUTOMATIONS ── */
  const renderAutomations=()=>(
    <div className="content">
      <div className="sub-bar"><div><div className="page-sub">Automações</div><div style={{fontSize:11,color:'var(--text4)',marginTop:2}}>{autos.filter(a=>a.active).length} de {autos.length} ativas</div></div></div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(275px,1fr))',gap:14}}>
        {autos.map(a=>(
          <div key={a.id} className="acrd">
            <div className="acrd-hd">
              <div className="aico" style={{background:a.active?'var(--primary-l)':'var(--border2)'}}>{a.icon}</div>
              <button className={`toggle ${a.active?'on':'off'}`} onClick={()=>setAutos(p=>p.map(x=>x.id===a.id?{...x,active:!x.active}:x))}/>
            </div>
            <div className="an">{a.name}</div>
            <div className="ad">{a.desc}</div>
            <div style={{marginTop:10}}><span className={`pill ${a.active?'pill-g':'pill-gray'}`}>{a.active?'Ativo':'Inativo'}</span></div>
          </div>
        ))}
      </div>
      {rescueQ.length>0&&(
        <>
          <div style={{fontSize:15,fontWeight:700,color:'var(--text)',marginTop:6,marginBottom:12}}>Fila de Resgate ({rescueQ.length})</div>
          {rescueQ.map(item=>(
            <div key={item.id} className="rescrd">
              <div className="resav">🔔</div>
              <div className="resinfo">
                <div className="resname">{item.title.slice(0,44)}</div>
                <div className="restime">Abandonou há {ago(item.lastMsg)}</div>
                {item.message&&<div className="resmsg">{item.message.slice(0,100)}...</div>}
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:6,flexShrink:0,alignItems:'flex-end'}}>
                <span className={`pill ${item.status==='sent'?'pill-g':'pill-o'}`}>{item.status==='sent'?'Enviado':'Pendente'}</span>
                {item.status==='pending'&&hasKey&&<button className="tbtn p" style={{fontSize:10,padding:'5px 10px'}} onClick={()=>sendRescue(item)}>Resgatar</button>}
              </div>
            </div>
          ))}
        </>
      )}
    </div>
  );

  /* ── KNOWLEDGE ── */
  const renderKnowledge=()=>(
    <div className="content">
      <div className="sub-bar"><div className="page-sub">Base de Conhecimento</div></div>
      <div className="ngrid">
        {NICHES.map(n=>(
          <div key={n.id} className={`ncard ${activeNiche===n.id?'on':''}`} onClick={()=>setNiche(n.id)}>
            {activeNiche===n.id&&<div className="natag">Ativo</div>}
            <span className="nem">{n.icon}</span>
            <div className="nn">{n.name}</div>
            <div className="ns">{n.badge} · {n.kws.length} palavras-chave</div>
          </div>
        ))}
      </div>
      <div className="div"/>
      <div style={{fontSize:14,fontWeight:700,color:'var(--text)',marginBottom:12}}>Palavras-chave — {cn.name}</div>
      <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
        {cn.kws.map(kw=>(
          <button key={kw} style={{padding:'5px 13px',border:'1px solid var(--border)',borderRadius:99,fontSize:11,fontWeight:500,color:'var(--text3)',cursor:'pointer',background:'var(--white)',transition:'all .12s',fontFamily:'Inter,sans-serif'}}
            onMouseEnter={e=>{e.target.style.borderColor='#10b981';e.target.style.color='#10b981';e.target.style.background='#d1fae5';}}
            onMouseLeave={e=>{e.target.style.borderColor='var(--border)';e.target.style.color='var(--text3)';e.target.style.background='var(--white)';}}
            onClick={()=>{newConv();setTimeout(()=>setInput(kw),160);}}>{kw}</button>
        ))}
      </div>
    </div>
  );

  /* ── ANALYTICS ── */
  const renderAnalytics=()=>(
    <div className="content">
      <div className="sub-bar"><div className="page-sub">Análises</div></div>
      <div className="mrow">
        {[
          {l:'Taxa de Conversão',v:`${rate}%`,ic:'📈',ci:'mci-g',bd:rate>40?'+5%':'-3%',up:rate>40},
          {l:'Vendas Ganhas',v:won,ic:'✅',ci:'mci-b',bd:'+12%',up:true},
          {l:'Vendas Perdidas',v:lost,ic:'❌',ci:'mci-p',bd:'',up:false},
          {l:'Total de Sessões',v:total,ic:'💬',ci:'mci-o',bd:'+8',up:true},
        ].map(m=>(
          <div key={m.l} className="mc">
            <div className="mc-top">
              <div className={`mc-icon ${m.ci}`}>{m.ic}</div>
              {m.bd&&<span className={`mc-badge ${m.up?'mcb-up':'mcb-dn'}`}>{m.bd}</span>}
            </div>
            <div className="mc-val">{m.v}</div>
            <div className="mc-lbl">{m.l}</div>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 280px',gap:14}}>
        <div className="card cp"><div className="ch"><div className="ct">Respostas ao longo do tempo</div></div><BarChart/></div>
        <div className="card cp" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>Taxa de Conversão</div>
          <Donut val={won} max={Math.max(total,1)} color="#10b981" size={110}/>
          <div className="prog" style={{width:'100%'}}>
            {[['Ganho',won,rate,'#10b981'],['Perdido',lost,total>0?Math.round(lost/total*100):0,'#ef4444'],['Ativo',total-won-lost,total>0?Math.round((total-won-lost)/total*100):0,'#3b82f6']].map(([l,v,p,c])=>(
              <div key={l} className="pi">
                <div className="pi-top"><div className="pi-lbl" style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:7,height:7,borderRadius:'50%',background:c,display:'inline-block'}}/>{l}: {v}</div><div className="pi-pct">{p}%</div></div>
                <div className="pi-bg"><div className="pi-f" style={{width:`${p}%`,background:c}}/></div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="tcrd">
        <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>Histórico de Sessões</div>
        </div>
        {convs.length===0&&<div style={{padding:24,textAlign:'center',color:'var(--text4)',fontSize:12}}>Nenhuma sessão ainda</div>}
        {convs.map((c,i)=>(
          <div key={c.id} className="trow" style={{gridTemplateColumns:'1fr 80px 100px 80px'}} onClick={()=>{setAid(c.id);setPage('inbox');}}>
            <div style={{display:'flex',gap:9,alignItems:'center'}}>
              <div style={{width:26,height:26,borderRadius:'50%',background:AVC[i%AVC.length],display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:11,fontWeight:700,flexShrink:0}}>{c.title.charAt(0).toUpperCase()}</div>
              <span style={{fontSize:12,fontWeight:500,color:'var(--text)'}}>{c.title.slice(0,38)}</span>
            </div>
            <div style={{fontSize:11,color:'var(--text4)'}}>{c.messages.length} msgs</div>
            <div style={{fontSize:11,color:'var(--text4)'}}>{fmtD(c.created_at)}</div>
            <div>{c.outcome?<span className={`pill ${c.outcome==='won'?'pill-g':'pill-r'}`}>{c.outcome==='won'?'Ganho':'Perdido'}</span>:<span className="pill pill-b">Ativo</span>}</div>
          </div>
        ))}
      </div>
    </div>
  );

  /* ── SETTINGS ── */
  const renderSettings=()=>(
    <div className="content">
      <div className="sub-bar"><div className="page-sub">Configurações</div></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        <div className="card cp">
          <div className="ct" style={{marginBottom:14}}>🔑 API Key — Groq (Gratuito)</div>
          <div className="fg">
            <label className="fl">CHAVE DE API</label>
            <div style={{display:'flex',gap:7}}>
              <input className="api-inp" style={{flex:1,fontSize:12,padding:'9px 11px',borderRadius:7}} type="password" placeholder={hasKey?'● ● ● ● configurada':'gsk_...'} value={apiInp} onChange={e=>setApiInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveKey()}/>
              <button className="api-save" style={{padding:'9px 16px',borderRadius:7,fontSize:12}} onClick={saveKey}>{hasKey?'Atualizar':'Salvar'}</button>
            </div>
            {hasKey&&<div className="api-hint ok" style={{marginTop:7}}><div className="live-dot"/>Conectado · LLaMA 3.3 70B via Groq</div>}
            {!hasKey&&<div className="api-hint" style={{marginTop:7}}>Grátis: <a href="https://console.groq.com" target="_blank">console.groq.com</a> → API Keys → Create</div>}
          </div>
          {hasKey&&<button onClick={()=>{setApiKey('');showT('Desconectado');}} style={{marginTop:6,padding:'7px 14px',border:'1px solid #fecaca',borderRadius:7,background:'var(--white)',color:'var(--red)',fontSize:12,cursor:'pointer',fontFamily:'Inter,sans-serif',fontWeight:500}}>Desconectar</button>}
        </div>
        <div className="card cp">
          <div className="ct" style={{marginBottom:14}}>🎯 Nicho Ativo</div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {NICHES.map(n=>(
              <div key={n.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 11px',borderRadius:7,border:`1.5px solid ${activeNiche===n.id?'#10b981':'var(--border)'}`,background:activeNiche===n.id?'#f0fdf4':'var(--white)',cursor:'pointer',transition:'all .15s'}} onClick={()=>setNiche(n.id)}>
                <span style={{fontSize:17}}>{n.icon}</span>
                <span style={{fontSize:12,fontWeight:600,color:'var(--text)',flex:1}}>{n.name}</span>
                {activeNiche===n.id&&<span className="pill pill-g">Ativo</span>}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );

  const PAGES={dashboard:renderDashboard,inbox:renderInbox,agents:renderAgents,automations:renderAutomations,knowledge:renderKnowledge,analytics:renderAnalytics,settings:renderSettings};

  return(
    <div className="app">
      {/* ICON RAIL */}
      <div className="rail">
        <div className="rail-logo">
          <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
            <path d="M9 1.5L15.5 5.25V12.75L9 16.5L2.5 12.75V5.25L9 1.5Z" stroke="white" strokeWidth="1.3" fill="rgba(255,255,255,.15)"/>
            <path d="M6.5 12V6.5L9 9.5V6.5M11.5 6.5V12" stroke="white" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
        {RAIL.map(n=>(
          <button key={n.id} className={`rail-btn ${page===n.id?'on':''}`} onClick={()=>setPage(n.id)} title={n.id}>{n.e}</button>
        ))}
        <div className="rail-sp"/>
        <div className="rail-bottom">
          <button className="rail-btn" onClick={()=>setPage('settings')}>⚙️</button>
          <button className="rail-btn">🌙</button>
        </div>
      </div>

      {/* SIDEBAR */}
      <div className="sidebar">
        <div className="sb-top">
          <div className="sb-page-title">
            {PAGE_TITLE[page]}
            <span style={{cursor:'pointer',color:'var(--text4)',fontSize:15}}>⇄</span>
          </div>
          {page==='dashboard'&&(
            <div className="sb-sub-nav">
              {[['Hub','#10b981',true],['Fontes de Dados','#6b7280',false],['Sugestões','#6b7280',false],['Área de Testes','#6b7280',false],['Tarefas','#6b7280',false],['Configurar','#6b7280',false],['Treinar IA','#6b7280',false]].map(([l,c,a])=>(
                <div key={l} className={`sb-sub-item ${a?'on':''}`}>
                  <div className="sb-sub-dot" style={{background:a?c:'#e5e7eb'}}/>{l}
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="api-strip">
          <div className="api-lbl">API KEY</div>
          <div className="api-row">
            <input className={`api-inp ${hasKey?'ok':''}`} type="password" placeholder={hasKey?'Configurada ✓':'gsk_...'} value={apiInp} onChange={e=>setApiInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveKey()}/>
            <button className="api-save" onClick={saveKey}>{hasKey?'✓':'Salvar'}</button>
          </div>
          {!hasKey&&<div className="api-hint">Grátis: <a href="https://console.groq.com" target="_blank">console.groq.com</a></div>}
          {hasKey&&<div className="api-hint ok"><div className="live-dot"/>Online · LLaMA 3.3 70B · <span style={{cursor:'pointer',textDecoration:'underline',color:'var(--text4)'}} onClick={()=>{setApiKey('');showT('Desconectado');}}>trocar</span></div>}
        </div>

        <nav className="sb-nav">
          {NAV.map(n=>(
            <div key={n.id} className={`nav-item ${page===n.id?'on':''}`} onClick={()=>setPage(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              {n.label}
              {n.badge&&!n.badgeGray&&<span className="nav-badge">{n.badge}</span>}
              {n.badgeGray&&<span className="nav-badge gray">{n.badgeGray}</span>}
              {n.id==='automations'&&pendR>0&&<span className="nav-badge red">{pendR}</span>}
            </div>
          ))}
        </nav>

        <div className="sb-foot">
          {/* User info */}
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:'var(--border2)',borderRadius:8,marginBottom:6}}>
            <div style={{width:28,height:28,borderRadius:'50%',background:'linear-gradient(135deg,var(--primary),var(--primary-h))',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:12,fontWeight:700,flexShrink:0}} id="sb-user-av">U</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:5,minWidth:0}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}} id="sb-user-name">Carregando...</div>
                <span style={{fontSize:8,fontWeight:700,color:'var(--primary)',background:'var(--primary-l)',padding:'1px 5px',borderRadius:99,flexShrink:0}} id="user-plan-sb">STARTER</span>
              </div>
              <div style={{fontSize:9,color:'var(--primary)',display:'flex',alignItems:'center',gap:3}}><div style={{width:5,height:5,borderRadius:'50%',background:'var(--primary)'}}/> Online</div>
            </div>
          </div>
          {[['⚙️','Configurações'],['🌙','Modo Escuro']].map(([ic,l])=>(
            <div key={l} className="sb-foot-item" onClick={l==='Configurações'?()=>setPage('settings'):undefined}>
              <span style={{fontSize:14}}>{ic}</span><span style={{fontSize:12}}>{l}</span>
            </div>
          ))}
          {/* Logout */}
          <div className="sb-foot-item" style={{color:'var(--red)',marginTop:2}} onClick={()=>{localStorage.removeItem('nexus_token');localStorage.removeItem('nexus_user');window.location.href='/login.html';}}>
            <span style={{fontSize:14}}>🚪</span><span style={{fontSize:12,fontWeight:600}}>Sair</span>
          </div>
        </div>
      </div>

      {/* MAIN */}
      <main className="main">
        <div className="topbar">
          <div className="topbar-title">{PAGE_TITLE[page]}</div>
          <div className="topbar-right">
            <div className="tb-icon">🔍</div>
            <div className="tb-icon">🔔</div>
            <div className="uav">N</div>
          </div>
        </div>

        {error&&<div className="err-bar">⚠️ {error}<button style={{marginLeft:'auto',background:'none',border:'none',cursor:'pointer',color:'var(--red)',fontSize:15}} onClick={()=>setError('')}>×</button></div>}

        {(PAGES[page]||renderDashboard)()}
      </main>

      {/* MODAL — Agent Form */}
      {showAF&&(
        <div className="ovl" onClick={e=>e.target===e.currentTarget&&setShowAF(false)}>
          <div className="modal">
            <div className="modal-t">Novo AI Agent</div>
            <p className="modal-s">Configure um agente com personalidade e capacidades específicas</p>
            <div className="fg"><label className="fl">NOME DO AGENTE</label><input className="fi" placeholder="ex: Closador de Vendas" value={aForm.name} onChange={e=>setAForm(p=>({...p,name:e.target.value}))}/></div>
            <div className="fg"><label className="fl">INSTRUÇÃO PRINCIPAL (System Prompt)</label><textarea className="ft" rows={4} placeholder="Você é um especialista em vendas consultivas..." value={aForm.prompt} onChange={e=>setAForm(p=>({...p,prompt:e.target.value}))}/></div>
            <div className="tgrid">
              <div className={`topt ${aForm.negotiate?'on':''}`} onClick={()=>setAForm(p=>({...p,negotiate:!p.negotiate}))}>
                <div className="tchk">{aForm.negotiate&&'✓'}</div>
                <div className="tlbl"><strong>💰 Negociação Ativa</strong><span>Contra-propostas automáticas</span></div>
              </div>
              <div className={`topt ${aForm.hybrid?'on':''}`} onClick={()=>setAForm(p=>({...p,hybrid:!p.hybrid}))}>
                <div className="tchk">{aForm.hybrid&&'✓'}</div>
                <div className="tlbl"><strong>🤝 Modo Humano</strong><span>Tom empático automático</span></div>
              </div>
            </div>
            <div className="mfoot">
              <button className="btn-c" onClick={()=>setShowAF(false)}>Cancelar</button>
              <button className="btn-ok" onClick={saveAgent} disabled={!aForm.name||!aForm.prompt}>Criar Agente</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL — Analysis */}
      {showAna&&(
        <div className="ovl" onClick={e=>e.target===e.currentTarget&&setShowAna(null)}>
          <div className="modal">
            <div className="modal-t">🔍 Análise de Venda Perdida</div>
            <p className="modal-s">Sessão: <strong>{showAna.title}</strong></p>
            {showAna.data.resumo&&<div style={{background:'var(--red-l)',border:'1px solid #fecaca',borderRadius:7,padding:'10px 13px',fontSize:12,color:'var(--text2)',lineHeight:1.6,marginBottom:12}}><strong style={{color:'var(--red)'}}>Diagnóstico: </strong>{showAna.data.resumo}</div>}
            {showAna.data.objecoes?.length>0&&(<><div className="asec-t">❌ Objeções não respondidas</div>{showAna.data.objecoes.map((o,i)=><div key={i} className="aitem">{o}</div>)}</>)}
            {showAna.data.recomendacoes?.length>0&&(<><div className="asec-t">✅ Recomendações</div>{showAna.data.recomendacoes.map((r,i)=><div key={i} className="aitem" style={{background:'var(--primary-l)'}}>{r}</div>)}</>)}
            {showAna.data.score_qualidade!=null&&(
              <div className="score-d">
                <div className="score-n" style={{color:showAna.data.score_qualidade>6?'var(--primary)':'var(--red)'}}>{showAna.data.score_qualidade}<span style={{fontSize:20,fontWeight:400,color:'var(--text4)'}}>/10</span></div>
                <div className="score-l">Score da Conversa</div>
              </div>
            )}
            <div className="mfoot"><button className="btn-c" onClick={()=>setShowAna(null)}>Fechar</button></div>
          </div>
        </div>
      )}

      {/* MODAL — Proposal */}
      {showProp&&(
        <div className="ovl" onClick={e=>e.target===e.currentTarget&&setShowProp(null)}>
          <div className="modal" style={{maxWidth:640}}>
            <div className="modal-t">📄 Proposta Comercial</div>
            <p className="modal-s">Sessão: <strong>{showProp.title}</strong></p>
            <div className="prop-frame" dangerouslySetInnerHTML={{__html:showProp.html}}/>
            <div className="mfoot">
              <button className="btn-c" onClick={()=>setShowProp(null)}>Fechar</button>
              <button className="btn-ok or" onClick={()=>{const w=window.open('','_blank');w.document.write(`<html><head><title>Proposta</title></head><body>${showProp.html}</body></html>`);w.document.close();w.print();}}>🖨️ Imprimir / PDF</button>
            </div>
          </div>
        </div>
      )}

      {toast&&<div className="toast">{toast}<span className="tx" onClick={()=>setToast('')}>×</span></div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
