<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Nexus AI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#10b981;--primary-h:#059669;--primary-l:#d1fae5;--primary-m:#a7f3d0;--text:#111827;--text2:#374151;--text3:#6b7280;--text4:#9ca3af;--border:#e5e7eb;--border2:#f3f4f6;--red:#ef4444;--red-l:#fee2e2}
html,body{height:100%;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
body{background:linear-gradient(135deg,#f0fdf4 0%,#f5f6fa 50%,#eff6ff 100%);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}

/* Background pattern */
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 50%,rgba(16,185,129,.06) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(59,130,246,.05) 0%,transparent 50%);pointer-events:none}

.card{background:#fff;border-radius:18px;padding:40px;width:100%;max-width:420px;box-shadow:0 4px 6px -1px rgba(0,0,0,.07),0 20px 40px -10px rgba(0,0,0,.08);border:1px solid var(--border);position:relative;z-index:1}

/* Logo */
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(16,185,129,.3);flex-shrink:0}
.logo-name{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.5px}
.logo-tag{font-size:11px;color:var(--text4);font-weight:500}

/* Title */
.card-title{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.5px;margin-bottom:6px}
.card-sub{font-size:13px;color:var(--text3);margin-bottom:28px;line-height:1.5}

/* Tabs */
.tabs{display:flex;background:var(--border2);border-radius:9px;padding:3px;margin-bottom:24px;gap:3px}
.tab{flex:1;padding:8px;border-radius:7px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;background:transparent;color:var(--text3);font-family:'Inter',sans-serif}
.tab.on{background:#fff;color:var(--primary);box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* Form */
.fg{margin-bottom:16px}
.fl{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;letter-spacing:.2px}
.fi{width:100%;background:var(--border2);border:1.5px solid var(--border);border-radius:9px;padding:11px 13px;font-size:13px;color:var(--text);outline:none;transition:all .2s;font-family:'Inter',sans-serif}
.fi:focus{background:#fff;border-color:var(--primary);box-shadow:0 0 0 3px rgba(16,185,129,.12)}
.fi.err{border-color:var(--red);box-shadow:0 0 0 3px rgba(239,68,68,.1)}
.fi-icon{position:relative}
.fi-icon .fi{padding-left:38px}
.fi-icon .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}

/* Password toggle */
.pw-wrap{position:relative}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text4);font-size:16px;padding:2px;transition:color .15s}
.pw-toggle:hover{color:var(--text3)}

/* Button */
.submit-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--primary),var(--primary-h));border:none;border-radius:9px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;letter-spacing:-.2px;box-shadow:0 2px 8px rgba(16,185,129,.3),0 1px 2px rgba(0,0,0,.05);margin-top:4px}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(16,185,129,.35)}
.submit-btn:active{transform:translateY(0)}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

/* Loading */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Error / success */
.alert{padding:11px 13px;border-radius:8px;font-size:12px;font-weight:500;margin-bottom:16px;display:flex;align-items:center;gap:8px;line-height:1.5}
.alert.err{background:var(--red-l);border:1px solid #fecaca;color:var(--red)}
.alert.ok{background:var(--primary-l);border:1px solid var(--primary-m);color:#065f46}

/* Divider */
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text4);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* Footer */
.card-footer{margin-top:22px;text-align:center;font-size:12px;color:var(--text4);line-height:1.8}
.link{color:var(--primary);cursor:pointer;font-weight:600;text-decoration:none}
.link:hover{text-decoration:underline}

/* Forgot pw */
.forgot{font-size:11px;color:var(--text4);cursor:pointer;text-align:right;margin-top:-10px;margin-bottom:14px;display:block}
.forgot:hover{color:var(--primary)}

/* Feature pills */
.features{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.feat{display:flex;align-items:center;gap:5px;padding:5px 10px;background:var(--border2);border-radius:99px;font-size:11px;font-weight:500;color:var(--text3)}
.feat span{font-size:13px}

/* Password strength */
.pw-strength{margin-top:5px;display:flex;gap:4px}
.pw-bar{height:3px;flex:1;border-radius:99px;background:var(--border);transition:background .3s}
.pw-bar.w{background:var(--red)}
.pw-bar.m{background:#f59e0b}
.pw-bar.s{background:var(--primary)}
.pw-text{font-size:10px;color:var(--text4);margin-top:3px}

/* Plan badge */
.plan-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.plan-opt{border:1.5px solid var(--border);border-radius:9px;padding:11px 8px;text-align:center;cursor:pointer;transition:all .18s}
.plan-opt:hover{border-color:var(--primary-m)}
.plan-opt.on{border-color:var(--primary);background:var(--primary-l)}
.plan-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px}
.plan-price{font-size:11px;color:var(--text4)}
.plan-price strong{color:var(--primary)}
</style>
</head>
<body>
<div class="card" id="card">
  <!-- Logo -->
  <div class="logo-row">
    <div class="logo-icon">
      <svg width="22" height="22" viewBox="0 0 18 18" fill="none">
        <path d="M9 1.5L15.5 5.25V12.75L9 16.5L2.5 12.75V5.25L9 1.5Z" stroke="white" strokeWidth="1.3" fill="rgba(255,255,255,.2)"/>
        <path d="M6.5 12V6.5L9 9.5V6.5M11.5 6.5V12" stroke="white" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    </div>
    <div>
      <div class="logo-name">Nexus AI</div>
      <div class="logo-tag">Plataforma de Vendas Inteligente</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab on" id="tab-login" onclick="switchTab('login')">Entrar</button>
    <button class="tab" id="tab-register" onclick="switchTab('register')">Criar conta</button>
  </div>

  <!-- Alert -->
  <div id="alert" style="display:none" class="alert"></div>

  <!-- LOGIN FORM -->
  <div id="form-login">
    <div class="fg">
      <label class="fl">E-MAIL</label>
      <div class="fi-icon">
        <span class="icon">✉️</span>
        <input class="fi" id="l-email" type="email" placeholder="seu@email.com" autocomplete="email"/>
      </div>
    </div>
    <div class="fg">
      <label class="fl">SENHA</label>
      <div class="pw-wrap">
        <input class="fi" id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password" style="padding-right:44px"/>
        <button class="pw-toggle" onclick="togglePw('l-pass', this)" tabindex="-1">👁️</button>
      </div>
    </div>
    <span class="forgot" onclick="showForgot()">Esqueci minha senha</span>
    <button class="submit-btn" id="btn-login" onclick="doLogin()">Entrar na plataforma</button>
    <div class="card-footer">
      Não tem conta? <span class="link" onclick="switchTab('register')">Crie grátis</span>
    </div>
  </div>

  <!-- REGISTER FORM -->
  <div id="form-register" style="display:none">
    <div class="features">
      <div class="feat"><span>🤖</span> IA de vendas</div>
      <div class="feat"><span>💰</span> Negocia por você</div>
      <div class="feat"><span>📊</span> Analytics</div>
    </div>
    <div class="fg">
      <label class="fl">SEU NOME</label>
      <input class="fi" id="r-name" type="text" placeholder="João Silva" autocomplete="name"/>
    </div>
    <div class="fg">
      <label class="fl">E-MAIL</label>
      <div class="fi-icon">
        <span class="icon">✉️</span>
        <input class="fi" id="r-email" type="email" placeholder="seu@email.com" autocomplete="email"/>
      </div>
    </div>
    <div class="fg">
      <label class="fl">SENHA</label>
      <div class="pw-wrap">
        <input class="fi" id="r-pass" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" oninput="checkStrength(this.value)" style="padding-right:44px"/>
        <button class="pw-toggle" onclick="togglePw('r-pass', this)" tabindex="-1">👁️</button>
      </div>
      <div class="pw-strength"><div class="pw-bar" id="s1"/><div class="pw-bar" id="s2"/><div class="pw-bar" id="s3"/></div>
      <div class="pw-text" id="sw">Digite uma senha</div>
    </div>
    <button class="submit-btn" id="btn-register" onclick="doRegister()">Criar minha conta</button>
    <div class="card-footer">
      Já tem conta? <span class="link" onclick="switchTab('login')">Entrar</span><br/>
      <span style="color:#9ca3af;font-size:11px">Ao criar conta você concorda com os termos de uso</span>
    </div>
  </div>
</div>

<script>
const TAB = { login: document.getElementById('form-login'), register: document.getElementById('form-register') };

function switchTab(t) {
  document.getElementById('form-login').style.display    = t==='login'    ? '' : 'none';
  document.getElementById('form-register').style.display = t==='register' ? '' : 'none';
  document.getElementById('tab-login').className    = 'tab' + (t==='login'    ? ' on' : '');
  document.getElementById('tab-register').className = 'tab' + (t==='register' ? ' on' : '');
  hideAlert();
}

function showAlert(msg, type='err') {
  const el = document.getElementById('alert');
  el.className = `alert ${type}`;
  el.innerHTML = (type==='err' ? '⚠️ ' : '✅ ') + msg;
  el.style.display = 'flex';
}
function hideAlert() { document.getElementById('alert').style.display = 'none'; }

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  inp.type  = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
}

function checkStrength(pw) {
  const bars = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3')];
  const sw   = document.getElementById('sw');
  bars.forEach(b => { b.className = 'pw-bar'; });
  if (!pw) { sw.textContent = 'Digite uma senha'; return; }
  if (pw.length < 4) { bars[0].classList.add('w'); sw.textContent = 'Senha fraca'; return; }
  if (pw.length < 8 || !/\d/.test(pw)) { bars[0].classList.add('m'); bars[1].classList.add('m'); sw.textContent = 'Senha média'; return; }
  bars.forEach(b => b.classList.add('s')); sw.textContent = 'Senha forte ✓';
}

// ── LOGIN ──
async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  if (!email || !pass) { showAlert('Preencha todos os campos'); return; }

  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Entrando...';
  hideAlert();

  try {
    const r = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'login', email, password: pass }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Erro ao fazer login');

    localStorage.setItem('nexus_token', data.token);
    localStorage.setItem('nexus_user',  JSON.stringify(data.user));

    showAlert('Login realizado! Redirecionando...', 'ok');
    setTimeout(() => {
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      const appUrl = isMobile ? '/app-mobile.html' : '/app.html';
      window.location.href = data.user.role === 'admin' ? '/admin.html' : appUrl;
    }, 700);
  } catch(e) {
    showAlert(e.message);
    btn.disabled = false;
    btn.textContent = 'Entrar na plataforma';
  }
}

// ── REGISTER (solicita acesso) ──
async function doRegister() {
  const name  = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const pass  = document.getElementById('r-pass').value;
  if (!name || !email || !pass) { showAlert('Preencha todos os campos'); return; }
  if (pass.length < 6) { showAlert('Senha deve ter ao menos 6 caracteres'); return; }

  const btn = document.getElementById('btn-register');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Criando conta...';
  hideAlert();

  // Simula envio de solicitação
  await new Promise(r => setTimeout(r, 1200));
  showAlert(`Solicitação enviada! Em breve você receberá um e-mail de acesso em <strong>${email}</strong>.`, 'ok');
  btn.disabled = false;
  btn.textContent = 'Criar minha conta';
}

function showForgot() {
  showAlert('Entre em contato: suporte@nexus.ai para recuperar sua senha.', 'ok');
}

// Atalho Enter
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const tab = document.getElementById('tab-login').classList.contains('on') ? 'login' : 'register';
  if (tab === 'login') doLogin(); else doRegister();
});

// Redireciona se já logado
const tok = localStorage.getItem('nexus_token');
if (tok) {
  fetch('/api/auth', { method:'POST', headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${tok}` }, body: JSON.stringify({ action:'verify' }) })
    .then(r => r.json()).then(d => {
      if (d.valid) window.location.href = d.user.role === 'admin' ? '/admin.html' : '/app.html';
    }).catch(() => {});
}
</script>
</body>
</html>
